<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Profiles - CITE-Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #621708; }
        .card-shadow { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05); }
        .nav-item:hover { background-color: #8c2a10; }
        .nav-item.active { background-color: #8c2a10; border-left: 4px solid #f5e8c7; }
    </style>
</head>
<body class="bg-gray-50">

<div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR -->
    <div class="sidebar w-72 text-white flex flex-col">
        <div onclick="window.location.href='dashboard.html'" class="px-6 pt-6 pb-4 cursor-pointer flex items-center gap-x-3 border-b border-white/20 hover:bg-white/10">
            <div class="w-11 h-11 bg-white rounded-2xl flex items-center justify-center">
                <span class="text-[#621708] text-3xl font-bold">CTU</span>
            </div>
            <div>
                <div class="text-lg font-semibold">CITE-Flow</div>
                <div class="text-xs opacity-75">College of Technology and Engineering</div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-3 py-6 space-y-8">
            <div onclick="window.location.href='faculty-profiles.html'" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl text-sm font-medium cursor-pointer active">👤 Faculty Profiles</div>
            <div onclick="window.location.href='workload-tracker.html'" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl text-sm font-medium cursor-pointer">📋 Workload Tracker</div>
            <div onclick="window.location.href='engagement-logs.html'" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl text-sm font-medium cursor-pointer">💬 Engagement Logs</div>
            <div onclick="window.location.href='workflow-approval.html'" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl text-sm font-medium cursor-pointer">🔄 Workflow Approval</div>
            <div onclick="window.location.href='calendar.html'" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl text-sm font-medium cursor-pointer">📅 Calendar</div>
            <div onclick="window.location.href='reports-analytics.html'" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl text-sm font-medium cursor-pointer">📊 Reports and Analytics</div>
            <div onclick="window.location.href='user-management.html'" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl text-sm font-medium cursor-pointer">👥 User Management</div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 overflow-y-auto p-8">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-semibold text-gray-900">Faculty Profiles</h1>
                <p class="text-gray-500 text-sm">Manage faculty members and their information</p>
            </div>
            <button onclick="addNewFaculty()" 
                    class="bg-[#621708] text-white px-6 py-3 rounded-3xl flex items-center gap-x-2 hover:bg-[#8c2a10]">
                <span class="text-xl">+</span> Add Faculty
            </button>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-3xl p-6 text-center card-shadow">
                <div class="text-sm text-gray-500">Total Faculty</div>
                <div id="total-faculty" class="text-6xl font-semibold text-gray-900">5</div>
            </div>
            <div class="bg-white rounded-3xl p-6 text-center card-shadow">
                <div class="text-sm text-gray-500">Active Faculty</div>
                <div id="active-faculty" class="text-6xl font-semibold text-emerald-600">4</div>
            </div>
            <div class="bg-white rounded-3xl p-6 text-center card-shadow">
                <div class="text-sm text-gray-500">On Leave</div>
                <div id="onleave-faculty" class="text-6xl font-semibold text-amber-500">1</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="flex items-center gap-4 bg-white rounded-3xl px-6 py-4 mb-8 card-shadow">
            <input id="search-input" onkeyup="if(event.key==='Enter') filterFaculty()" 
                   type="text" placeholder="Search faculty..." 
                   class="flex-1 bg-transparent focus:outline-none text-sm">

            <select id="dept-filter" onchange="filterFaculty()" class="bg-transparent border border-gray-200 rounded-2xl px-5 py-3 text-sm focus:outline-none focus:border-[#621708]">
                <option value="">All Departments</option>
                <option value="BSIT">BSIT</option>
                <option value="BSIE">BSIE</option>
                <option value="BIT">BIT</option>
            </select>

            <select id="status-filter" onchange="filterFaculty()" class="bg-transparent border border-gray-200 rounded-2xl px-5 py-3 text-sm focus:outline-none focus:border-[#621708]">
                <option value="">All Status</option>
                <option value="Active">Active</option>
                <option value="On Leave">On Leave</option>
                <option value="Retired">Retired</option>
            </select>

            <select id="employment-filter" onchange="filterFaculty()" class="bg-transparent border border-gray-200 rounded-2xl px-5 py-3 text-sm focus:outline-none focus:border-[#621708]">
                <option value="">All Employment Types</option>
                <option value="Full-Time">Full-Time</option>
                <option value="Part-Time">Part-Time</option>
            </select>
        </div>

        <!-- Faculty Grid -->
        <div id="faculty-grid" class="grid grid-cols-3 gap-6"></div>
    </div>
</div>

<script>
    let facultyData = [
        {id:1, name:"Maria Santos", position:"Associate Professor", status:"Active", department:"BSIT", email:"maria.santos@cite.edu", phone:"+63 912 345 6789"},
        {id:2, name:"Juan Cruz", position:"Full Professor", status:"Active", department:"BSIE", email:"juan.cruz@cite.edu", phone:"+63 923 456 7890"},
        {id:3, name:"Ana Reyes", position:"Assistant Professor", status:"Active", department:"BIT", email:"ana.reyes@cite.edu", phone:"+63 934 567 8901"},
        {id:4, name:"Carlos Garcia", position:"Instructor", status:"Active", department:"BSIT", email:"carlos.garcia@cite.edu", phone:"+63 945 678 9012"},
        {id:5, name:"Elena Torres", position:"Associate Professor", status:"On Leave", department:"BSIE", email:"elena.torres@cite.edu", phone:"+63 956 789 0123"}
    ];

    function renderFacultyCards(data) {
        const grid = document.getElementById('faculty-grid');
        grid.innerHTML = '';
        data.forEach(f => {
            const statusClass = f.status === 'Active' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700';
            const html = `
            <div class="bg-white rounded-3xl p-6 card-shadow hover:shadow-xl transition-all">
                <div class="flex justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-gray-100 rounded-2xl flex items-center justify-center text-3xl">👤</div>
                        <div>
                            <div class="font-semibold">${f.name}</div>
                            <div class="text-sm text-gray-500">${f.position}</div>
                        </div>
                    </div>
                    <span class="px-4 py-1 text-xs font-medium rounded-3xl ${statusClass}">${f.status}</span>
                </div>
                <div class="mt-6 space-y-2 text-sm">
                    <div class="flex justify-between"><span class="text-gray-500">Email</span><span class="text-[#621708]">${f.email}</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Phone</span><span>${f.phone}</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Department</span><span class="px-3 py-0.5 bg-[#621708] text-white text-xs rounded-2xl">${f.department}</span></div>
                </div>
            </div>`;
            grid.innerHTML += html;
        });

        document.getElementById('total-faculty').textContent = facultyData.length;
        document.getElementById('active-faculty').textContent = facultyData.filter(f => f.status === 'Active').length;
        document.getElementById('onleave-faculty').textContent = facultyData.filter(f => f.status === 'On Leave').length;
    }

    function filterFaculty() {
        const search = document.getElementById('search-input').value.toLowerCase();
        const dept = document.getElementById('dept-filter').value;
        const status = document.getElementById('status-filter').value;

        let filtered = facultyData.filter(f => 
            (!search || f.name.toLowerCase().includes(search)) &&
            (!dept || f.department === dept) &&
            (!status || f.status === status)
        );
        renderFacultyCards(filtered);
    }

    function addNewFaculty() {
        const name = prompt("Enter new faculty full name:");
        if (!name) return;
        const newF = {
            id: Date.now(),
            name: name,
            position: "Instructor",
            status: "Active",
            department: "BSIT",
            email: name.toLowerCase().replace(" ",".") + "@cite.edu",
            phone: "+63 900 000 0000"
        };
        facultyData.unshift(newF);
        renderFacultyCards(facultyData);
    }

    window.onload = () => {
        renderFacultyCards(facultyData);
    };
</script>
</body>
</html>

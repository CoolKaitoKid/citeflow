<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CTU – Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .layout {
      width: 80%;
      max-width: 1400px;
      display: flex;
      align-items: center;
      gap: clamp(30px, 4vw, 80px);
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      overflow-y: auto;
    }

    .layout {
      width: 80%;
      max-width: 1400px;
      display: flex;
      align-items: center;
      gap: clamp(30px, 4vw, 80px);
    }

    .form-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .logo {
      width: clamp(4rem, 5.5vw, 5.125rem);
      height: clamp(4rem, 5.5vw, 5.125rem);
      border-radius: 50%;
      object-fit: contain;
      background: #efefef;
      margin: 0 auto clamp(1rem, 2.2vw, 1.75rem);
      box-shadow: 0 3px 12px rgba(0,0,0,0.07);
    }

    h1 {
      font-size: clamp(1.5rem, 2.2vw, 2rem);
      font-weight: 700;
      color: #000;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: clamp(0.8125rem, 1vw, 0.875rem);
      color: #666;
      margin-bottom: clamp(1.5rem, 3vw, 2.625rem);
    }

    .field {
      margin-bottom: clamp(1.125rem, 2vw, 1.5rem);
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      color: #333;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .input-box {
      height: clamp(3rem, 3vw, 3.25rem);
      background: #ffffff;
      border: 1px solid #bbb;
      border-radius: 0.875rem;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .input-box:focus-within {
      border-color: #9c2f1f;
      outline: 3px solid rgba(156,47,31,0.1);
      outline-offset: 1px;
    }

    .icon-square {
      width: clamp(2.125rem, 2.5vw, 2.375rem);
      height: clamp(2.125rem, 2.5vw, 2.375rem);
      background: transparent;
      color: #9c2f1f;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.9375rem, 1.1vw, 1rem);
      flex-shrink: 0;
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 0.875rem;
      font-family: inherit;
      color: #111;
    }

    input::placeholder {
      color: #9a9a9a;
    }

    .password-wrapper {
      position: relative;
    }

    .eye-btn {
      background: none;
      border: none;
      font-size: 1rem;
      color: #555;
      cursor: pointer;
      padding: 0 4px;
      width: 24px;
      flex-shrink: 0;
    }

    .options-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8125rem;
      color: #333;
      margin-top: 10px;
    }

    .remember-box {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .forgot-link {
      color: #333;
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      height: clamp(2.8125rem, 3vw, 3.125rem);
      margin-top: clamp(1.125rem, 2vw, 1.5rem);
      background: #9c2f1f;
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .login-btn:hover {
      background: #84261a;
    }

    .register-text {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8125rem;
      color: #555;
    }

    .register-text a {
      color: #000;
      font-weight: 600;
      text-decoration: none;
    }

    .register-text a:hover {
      text-decoration: underline;
    }

    .department-logos {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    .dept-logo {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }

    .image-area {
      flex: 1.2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .image-wrapper {
      width: 100%;
      max-width: 100%;
      height: auto;
      aspect-ratio: 4 / 4;
      position: relative;
      border-radius: 2.5rem;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.0);
    }

    .image-area img {
      width: 105%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      clip-path: polygon(0 0, 90% 0, 75% 100%, 0% 100%);
    }

    .image-area::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 2.5rem;
      background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.25));
      pointer-events: none;
      z-index: 1;
    }

    @media (max-width: 1024px) {
      .layout {
        flex-direction: column;
        min-height: auto;
        padding: clamp(20px, 4vw, 40px) 0;
      }

      .image-wrapper {
        aspect-ratio: 16 / 9;         /* wider on mobile */
        max-height: 50vh;
        min-height: 320px;
      }

      .image-area img {
        clip-path: none;              /* remove angle on mobile */
        border-radius: 24px;
      }
    }

    @media (max-width: 640px) {
      .layout {
        width: 92%;
      }

      .logo {
        width: 70px;
        height: 70px;
      }

      h1 {
        font-size: 26px;
      }

      .subtitle {
        margin-bottom: 28px;
      }

      .image-wrapper {
        max-height: 45vh;
      }
    }
  </style>
</head>
<body>

  <div class="layout">

    <div class="image-area">
      <div class="image-wrapper">
        <img src="bldg1.jpg" alt="University campus building">
      </div>
    </div>

    <div class="form-area">

      <img src="ctu-logo.png" alt="CTU logo" class="logo">

      <h1>Welcome Back!</h1>
      <div class="subtitle">Access your CiteFlow account</div>

      <form>

        <div class="field">
          <label>Email</label>
          <div class="input-box">
            <div class="icon-square"><i class="far fa-envelope"></i></div>
            <input type="email" placeholder="name@citeflow.edu.ph" required autocomplete="email">
          </div>
        </div>

        <div class="field">
          <label>Password</label>
          <div class="input-box password-wrapper">
            <div class="icon-square"><i class="fas fa-lock"></i></div>
            <input type="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="eye-btn" aria-label="Toggle password visibility">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="options-bar">
          <label class="remember-box">
            <input type="checkbox">
            Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn">Login</button>

      </form>

      <div class="register-text">
        Don't have an account? <a href="register.html">Register</a>
      </div>

      <div class="department-logos">
        <img src="bit_logo.png" alt="BIT Logo" class="dept-logo">
        <img src="bsit_logo.png" alt="BSIT Logo" class="dept-logo">
        <img src="bsie_logo.png" alt="BSIE Logo" class="dept-logo">
      </div>

    </div>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const eyeBtns = document.querySelectorAll('.eye-btn');

      eyeBtns.forEach(btn => {
        const input = btn.parentElement.querySelector('input');
        const icon = btn.querySelector('i');

        btn.addEventListener('click', function() {
          if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
          } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
          }
        });
      });
    });
  </script>

</body>
</html>

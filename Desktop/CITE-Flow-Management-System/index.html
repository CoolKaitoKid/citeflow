<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to CiteFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f7f7f7;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 1.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .logo {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 2rem;
      color: #9c2f1f;
      margin-bottom: 0.5rem;
    }
    p {
      color: #444;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .links a {
      background: #9c2f1f;
      color: #fff;
      padding: 0.75rem 0;
      border-radius: 0.75rem;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    .links a:hover {
      background: #84261a;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="ctu-logo.png" alt="CiteFlow Logo" class="logo">
    <h1>Welcome to CiteFlow</h1>
    <p>Your gateway to citation management and more.<br>Get started below:</p>
    <div class="links">
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </div>
  </div>
</body>
</html>

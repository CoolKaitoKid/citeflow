        .dropdown-menu { position: absolute; right: 0; top: calc(100% + 10px); background: #fff; border: 1px solid #e5e7eb; border-radius: 18px; box-shadow: 0 20px 50px rgba(15,23,42,.16); min-width: 340px; z-index: 60; display: none; padding: 8px; max-height: 380px; overflow-y: auto; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

<script>
const SUPABASE_URL = typeof window.__SUPABASE_URL__ !== 'undefined' ? window.__SUPABASE_URL__ : 'https://uforealazougjckepggc.supabase.co';
const SUPABASE_ANON = typeof window.__SUPABASE_ANON__ !== 'undefined' ? window.__SUPABASE_ANON__ : 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmb3JlYWxhem91Z2pja2VwZ2djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjAzODksImV4cCI6MjA5MTgzNjM4OX0.wzGQAiYOuiQjb3gAbaF41yAJJyQ-CCHfMruNUEwfnp0';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);
const state = { faculty: [], tasks: [], assignments: [], submissions: [], submissionFiles: [], notifications: [] };
const draftUploads = {}; // taskId -> File[]
let currentFaculty = null;
let currentUser = null;
let realtimeChannel = null;
let selectedTaskId = null;
let currentView = 'list';
let currentFilter = 'all';
let unreadNotifications = 0;
let isFetchingData = false;
let needsFetchAfterCurrent = false;
const submissionBucket = 'wf-submissions';
let authChecked = false;


const icons = {
    search: '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>',
    bell: '<svg class="w-5 h-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>',
    back: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.25"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>',
    arrow: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>',
    calendar: '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
    file: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>',
    upload: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>',
    send: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/></svg>',
    check: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>',
    clock: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
    note: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>'
};

function escapeHtml(value) { return String(value ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])); }
function formatDate(iso) { if (!iso) return 'No due date'; return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
function isPastDue(iso) { return iso ? new Date(iso).getTime() < Date.now() : false; }
function daysUntil(iso) { if (!iso) return null; return Math.ceil((new Date(iso).getTime() - Date.now()) / 86400000); }
function getTaskById(id) { return state.tasks.find(t => String(t.id) === String(id)); }
function getSubmission(taskId, facultyId) { return state.submissions.find(s => String(s.task_id) === String(taskId) && String(s.faculty_id) === String(facultyId)); }
function getSubmissionFiles(submissionId) { return state.submissionFiles.filter(f => String(f.submission_id) === String(submissionId)).map(f => f.file_name); }
function getDraftFiles(taskId) { return Array.isArray(draftUploads[taskId]) ? draftUploads[taskId] : []; }
function getDraftFileNames(taskId) { return getDraftFiles(taskId).map(f => f?.name).filter(Boolean); }
function normalizeFacultyForSubmissions(row) {
    return {
        ...row,
        id: row.id,
        auth_user_id: row.auth_user_id || null,
        full_name: row.full_name || row.name || row.email || 'Faculty Member',
        department_code: row.department || row.department_code || 'N/A',
        is_active: row.access_enabled !== false && String(row.status || 'Active').toLowerCase() === 'active'
    };
}


function resolveCurrentFaculty() {
    return currentFaculty;
}

function setSidebarFaculty(profile, user) {
    const nameEl = document.getElementById('sidebarFacultyName');
    const roleEl = document.getElementById('sidebarFacultyRole');
    const fallbackName = user?.user_metadata?.full_name || user?.email?.split('@')?.[0] || 'Faculty Member';
    if (nameEl) nameEl.textContent = profile?.full_name || profile?.name || fallbackName;
    if (roleEl) roleEl.textContent = 'Faculty Member';
}

async function requireFacultyAuth() {
    if (authChecked && currentUser) return true;

    const { data, error } = await db.auth.getSession();

    if (error || !data?.session?.user) {
        window.location.href = '../faculty-login.html';
        return false;
    }

    const user = data.session.user;
    const role = String(user.user_metadata?.role || '').toLowerCase();

    if (role && role !== 'faculty') {
        await db.auth.signOut();
        window.location.href = '../login.html';
        return false;
    }

    currentUser = user;
    authChecked = true;
    return true;
}

async function loadCurrentFacultyProfile() {
    if (!currentUser) return null;
    const email = String(currentUser.email || '').toLowerCase();

    let response = await db
        .from('faculty')
        .select('*')
        .eq('auth_user_id', currentUser.id)
        .maybeSingle();

    if (response.error) {
        console.error('Failed to load faculty profile by auth_user_id:', response.error);
    }

    if (!response.data && email) {
        response = await db
            .from('faculty')
            .select('*')
            .or(`email.eq.${email},existing_email.eq.${email}`)
            .maybeSingle();
        if (response.error) {
            console.error('Failed to load faculty profile by email:', response.error);
        }
    }

    if (!response.data) return null;
    const normalized = normalizeFacultyForSubmissions(response.data);
    return normalized.is_active ? normalized : null;
}


function effectiveStatus(task, sub) {
    if (!sub) return isPastDue(task.due_at) ? 'Late' : 'Not Submitted';
    if ((sub.status === 'submitted' || sub.status === 'notsubmitted') && isPastDue(task.due_at)) return 'Late';
    const map = { submitted: 'Submitted', late: 'Late', underreview: 'Under Review', pending: 'Under Review', approved: 'Approved', rejected: 'Rejected', revision: 'Returned for Revision', notsubmitted: 'Not Submitted' };
    return map[sub.status] || 'Not Submitted';
}

function isActionable(status) { return ['Not Submitted', 'Returned for Revision', 'Late', 'Rejected'].includes(status); }
function isSubmittedStatus(status) { return ['Submitted', 'Under Review', 'Approved'].includes(status); }

function statusClass(status) {
    const map = {
        'Not Submitted': 'bg-slate-100 text-slate-700 ring-1 ring-slate-200',
        'Submitted': 'bg-blue-50 text-blue-700 ring-1 ring-blue-100',
        'Late': 'bg-red-50 text-red-700 ring-1 ring-red-100',
        'Under Review': 'bg-indigo-50 text-indigo-700 ring-1 ring-indigo-100',
        'Approved': 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-100',
        'Rejected': 'bg-slate-200 text-slate-700 ring-1 ring-slate-300',
        'Returned for Revision': 'bg-amber-50 text-amber-700 ring-1 ring-amber-100'
    };
    return map[status] || map['Not Submitted'];
}

function dueIndicator(task, status) {
    if (status === 'Approved') return { color: 'bg-emerald-500', tone: 'bg-emerald-50 text-emerald-700 ring-emerald-100', label: 'Approved', caption: 'Completed and approved' };
    const d = daysUntil(task.due_at);
    if (d === null) return { color: 'bg-slate-300', tone: 'bg-slate-50 text-slate-600 ring-slate-100', label: 'No due date', caption: 'No deadline set' };
    if (d <= 0) return { color: 'bg-red-500', tone: 'bg-red-50 text-red-700 ring-red-100', label: 'Past due', caption: 'Deadline has passed' };
    if (d <= 1) return { color: 'bg-red-500', tone: 'bg-red-50 text-red-700 ring-red-100', label: '24 hrs left', caption: 'Due within 1 day' };
    if (d <= 3) return { color: 'bg-amber-400', tone: 'bg-amber-50 text-amber-700 ring-amber-100', label: `${d} days left`, caption: 'Deadline approaching' };
    return { color: 'bg-slate-300', tone: 'bg-slate-50 text-slate-600 ring-slate-100', label: `${d} days left`, caption: 'On schedule' };
}

function getAssignedModels() {
    const faculty = resolveCurrentFaculty();
    if (!faculty) return [];
    const assignedTaskIds = state.assignments.filter(a => String(a.faculty_id) === String(faculty.id)).map(a => String(a.task_id));
    return state.tasks.filter(t => assignedTaskIds.includes(String(t.id))).map(task => {
        const sub = getSubmission(task.id, faculty.id);
        const status = effectiveStatus(task, sub);
        const files = draftUploads[task.id] || (sub ? getSubmissionFiles(sub.id) : []);
        return { task, sub, status, files, indicator: dueIndicator(task, status) };
    });
}

function getVisibleModels() {
    const query = (document.getElementById('taskSearch')?.value || '').toLowerCase().trim();
    return getAssignedModels().filter(m => {
        const matchesFilter = currentFilter === 'all' || (currentFilter === 'pending' && isActionable(m.status)) || (currentFilter === 'submitted' && isSubmittedStatus(m.status));
        const haystack = `${m.task.title || ''} ${m.task.instructions || ''} ${m.status}`.toLowerCase();
        return matchesFilter && (!query || haystack.includes(query));
    });
}

function renderTopBar(title, subtitle, showBack = false) {
    return `
        <header class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5 mb-7">
            <div class="flex items-start gap-4">
                ${showBack ? `<button onclick="showListPage()" class="button w-11 h-11 rounded-2xl bg-white border border-gray-200 text-gray-600 hover:text-[#621708] hover:border-[#e3c6b6] flex items-center justify-center" aria-label="Back to task list">${icons.back}</button>` : `<button onclick="window.history.back()" class="button w-11 h-11 rounded-2xl bg-white border border-gray-200 text-gray-600 hover:text-[#621708] hover:border-[#e3c6b6] flex items-center justify-center" aria-label="Go back">${icons.back}</button>`}
                <div>
                    <div class="flex items-center gap-2 text-sm text-gray-500 mb-2"><span>Document Management</span><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg><span class="font-semibold text-[#621708]">Submissions</span></div>
                    <h1 class="text-3xl lg:text-4xl font-bold tracking-tight text-gray-950">${escapeHtml(title)}</h1>
                    <p class="text-gray-600 mt-2 max-w-2xl">${escapeHtml(subtitle)}</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="relative">
                    <div class="notif-bell bg-white border border-gray-200" onclick="toggleNotifications()" aria-label="Open notifications">${icons.bell}<span id="notifBadge" class="notif-badge" style="display:none;">0</span></div>
                    <div id="notifDropdown" class="dropdown-menu"><div class="px-3 py-3 border-b border-gray-100 flex justify-between items-center"><span class="font-semibold text-sm text-gray-950">Notifications</span><button onclick="markFacultyNotificationsRead()" class="text-xs font-semibold text-[#621708] hover:underline">Mark all read</button></div><div id="notifList" class="py-1"></div></div>
                </div>
            </div>
        </header>`;
}

function renderSummary(models) {
    const pending = models.filter(m => isActionable(m.status)).length;
    const approved = models.filter(m => m.status === 'Approved').length;
    const urgent = models.filter(m => ['bg-red-500','bg-amber-400'].includes(m.indicator.color) && m.status !== 'Approved').length;
    return `<section class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-7">
        <div class="surface rounded-[1.75rem] p-5"><p class="text-sm text-gray-500">Assigned tasks</p><div class="text-3xl font-bold mt-1">${models.length}</div></div>
        <div class="surface rounded-[1.75rem] p-5"><p class="text-sm text-gray-500">Needs action</p><div class="text-3xl font-bold mt-1">${pending}</div></div>
        <div class="surface rounded-[1.75rem] p-5"><p class="text-sm text-gray-500">Due soon</p><div class="text-3xl font-bold mt-1">${urgent}</div></div>
        <div class="surface rounded-[1.75rem] p-5"><p class="text-sm text-gray-500">Approved</p><div class="text-3xl font-bold mt-1">${approved}</div></div>
    </section>`;
}

    const { task, status, files, indicator } = model;

function wireUploadInputs() {
    document.querySelectorAll('.task-upload-input').forEach(input => {
        input.addEventListener('change', (e) => {
            const taskId = e.target.dataset.task;
            draftUploads[taskId] = Array.from(e.target.files || []).filter(Boolean);
            selectedTaskId = String(taskId);
            renderDetailPage();
        });
    });
}

function sanitizeFileName(name) {
    return String(name || 'file').replace(/[^a-zA-Z0-9.\-_]/g, '_');
}

function isStorageBucketMissingError(error) {
    const message = String(error?.message || '').toLowerCase();
    return message.includes('bucket') && message.includes('not found');
}

async function uploadFilesToStorage({ facultyId, taskId, submissionId, files }) {
    const uploaded = [];
    for (const file of files) {
        const safeName = sanitizeFileName(file.name);
        const path = `${facultyId}/${taskId}/${submissionId}/${Date.now()}-${safeName}`;
        const { error: uploadError } = await db.storage.from(submissionBucket).upload(path, file, { upsert: true, contentType: file.type || undefined });
        if (uploadError) {
            if (isStorageBucketMissingError(uploadError)) {
                throw new Error(`Storage bucket "${submissionBucket}" is missing. Create it in Supabase Storage to enable document preview.`);
            }
            throw uploadError;
        }
        const { data } = db.storage.from(submissionBucket).getPublicUrl(path);
        uploaded.push({ file_name: file.name, file_url: data?.publicUrl || '', storage_path: path });
    }
    return uploaded;
}

function getFacultyNotifications() {
    const faculty = resolveCurrentFaculty();
    if (!faculty) return [];
    return (state.notifications || []).filter(n => n.message && (n.message.includes(faculty.full_name) || n.type === 'task'));
}
function renderNotifications() {
    const list = document.getElementById('notifList');
    if (!list) return;
    const items = getFacultyNotifications();
    if (!items.length) { list.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">No notifications yet</p>'; return; }
    list.innerHTML = items.map(n => `<div class="dropdown-item ${n.is_read ? '' : 'bg-blue-50'}"><div class="flex-1"><div class="text-sm text-gray-800">${escapeHtml(n.message)}</div><div class="text-xs text-gray-400 mt-0.5">${formatDate(n.created_at)}</div></div>${n.is_read ? '' : '<div class="w-2 h-2 bg-blue-500 rounded-full"></div>'}</div>`).join('');
}
function updateNotifBadge() {
    unreadNotifications = getFacultyNotifications().filter(n => !n.is_read).length;
    const badge = document.getElementById('notifBadge');
    const sidebarDot = document.getElementById('sidebarNotifToggle');
    if (!badge) return;
    const label = unreadNotifications > 99 ? '99+' : String(unreadNotifications);
    if (unreadNotifications > 0) {
        badge.style.display = 'flex';
        badge.textContent = label;
        if (sidebarDot) {
            sidebarDot.style.display = 'flex';
            sidebarDot.textContent = label;
        }
    } else {
        badge.style.display = 'none';
        if (sidebarDot) sidebarDot.style.display = 'none';
    }
}
function toggleNotifications() { document.getElementById('notifDropdown')?.classList.toggle('open'); }
async function markFacultyNotificationsRead() {
    const ids = getFacultyNotifications().filter(n => !n.is_read).map(n => n.id);
    if (!ids.length) return;
    const { error } = await db.from('wf_notifications').update({ is_read: true }).in('id', ids);
    if (error) { alert(error.message); return; }
    await fetchAllData();
}

async function submitTask(taskId) {
    const faculty = resolveCurrentFaculty();
    if (!faculty) { alert('No matching active faculty profile found.'); return; }
    const task = getTaskById(taskId);
    if (!task) return;
    const files = getDraftFiles(taskId);
    if (!files.length) { alert('Please upload at least one file before submitting.'); return; }

    const payload = {
        task_id: taskId,
        faculty_id: faculty.id,
        submitted_at: new Date().toISOString(),
        status: isPastDue(task.due_at) ? 'late' : 'submitted',
        reviewed_by_name: null,
        reviewed_at: null,
        review_remarks: ''
    };

    const { data: savedSubmission, error: saveError } = await db
        .from('wf_submissions')
        .upsert(payload, { onConflict: 'task_id,faculty_id' })
        .select('id')
        .single();

    if (saveError) { alert(saveError.message); return; }
    const submissionId = savedSubmission?.id;
    if (!submissionId) { alert('Submission was saved, but no submission ID was returned.'); return; }

    await db.from('wf_submission_files').delete().eq('submission_id', submissionId);

    let uploaded = [];
    let savedWithoutStorage = false;
    try {
        uploaded = await uploadFilesToStorage({ facultyId: faculty.id, taskId, submissionId, files });
    } catch (e) {
        if (String(e?.message || '').toLowerCase().includes('storage bucket') || isStorageBucketMissingError(e)) {
            uploaded = files.map(file => ({ file_name: file.name, file_url: '', storage_path: '' }));
            savedWithoutStorage = true;
        } else {
            alert(e?.message || 'File upload failed.');
            return;
        }
    }

    const rows = uploaded.map(f => ({ submission_id: submissionId, file_name: f.file_name, file_url: f.file_url || '', storage_path: f.storage_path || '' }));
    if (rows.length) {
        let { error: filesError } = await db.from('wf_submission_files').insert(rows);
        if (filesError && /column|schema|cache/i.test(filesError.message || '')) {
            const fallbackRows = uploaded.map(f => ({ submission_id: submissionId, file_name: f.file_name }));
            const retry = await db.from('wf_submission_files').insert(fallbackRows);
            filesError = retry.error;
            if (!filesError && !savedWithoutStorage) {
                alert('Submission saved, but file preview needs DB columns. Please add wf_submission_files.file_url (text) and optionally storage_path (text).');
            }
        }
        if (filesError) { alert(filesError.message); return; }
    }

    await db.from('wf_notifications').insert({ type: 'submission', faculty_id: faculty.id, task_id: taskId, message: `New submission from ${faculty.full_name}: ${task.title}`, is_read: false });
    await db.from('wf_activity_log').insert({ action: 'Submitted task', actor_name: faculty.full_name, target: task.title, log_type: 'submission' });
    delete draftUploads[taskId];
    selectedTaskId = String(taskId);
    await fetchAllData();

    if (savedWithoutStorage) {
        alert('Submission saved. File names were recorded, but preview/download is disabled because the wf-submissions storage bucket is missing.');
    }
}

async function fetchAllData() {
    if (isFetchingData) return;
    isFetchingData = true;

    const root = document.getElementById('appRoot');

    try {
        const ok = await requireFacultyAuth();
        if (!ok) return;

        currentFaculty = await loadCurrentFacultyProfile();
        setSidebarFaculty(currentFaculty, currentUser);

        if (!currentFaculty) {
            root.innerHTML = `${renderTopBar('Submission Tasks', 'Faculty profile not found.', false)}<div class="rounded-3xl p-6 bg-white border border-amber-200 text-amber-800">Your account is signed in, but no matching active faculty profile was found in the faculty table. Please ask the administrator to check your faculty profile.</div>`;
            return;
        }

        const [faculty, tasks, assignments, submissions, files, notifications] = await Promise.all([
            db.from('faculty').select('*').order('full_name', { ascending: true }),
            db.from('wf_tasks').select('*').order('created_at', { ascending: false }),
            db.from('wf_task_assignments').select('*'),
            db.from('wf_submissions').select('*'),
            db.from('wf_submission_files').select('*'),
            db.from('wf_notifications').select('*').order('created_at', { ascending: false }).limit(100)
        ]);

        if (faculty.error || tasks.error || assignments.error || submissions.error) {
            const msg =
                faculty.error?.message ||
                tasks.error?.message ||
                assignments.error?.message ||
                submissions.error?.message ||
                'Failed to load realtime data.';

            root.innerHTML = `${renderTopBar('Submission Tasks', 'There was a problem loading your tasks.', false)}<div class="rounded-3xl p-6 bg-white border border-red-100 text-red-600">${escapeHtml(msg)}</div>`;
            return;
        }

        if (files.error || notifications.error) {
            console.warn('Optional submission data could not be loaded:', { files, notifications });
        }

        state.faculty = (faculty.data || []).map(normalizeFacultyForSubmissions).filter(f => f.is_active);
        state.tasks = tasks.data || [];
        state.assignments = assignments.data || [];
        state.submissions = submissions.data || [];
        state.submissionFiles = files.error ? [] : (files.data || []);
        state.notifications = notifications.error ? [] : (notifications.data || []);

        if (currentView === 'detail' && selectedTaskId) {
            renderDetailPage();
        } else {
            renderListPage();
        }
    } finally {
        isFetchingData = false;
    }
}

function initRealtime() {
    if (realtimeChannel) db.removeChannel(realtimeChannel);
    realtimeChannel = db.channel('wf-faculty-live')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'faculty' }, fetchAllData)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'wf_tasks' }, fetchAllData)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'wf_task_assignments' }, fetchAllData)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'wf_submissions' }, fetchAllData)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'wf_submission_files' }, fetchAllData)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'wf_notifications' }, fetchAllData)
        .subscribe();
}

window.onload = async () => {
    await fetchAllData();

    // Realtime disabled to prevent Supabase Auth lock conflicts.
    // initRealtime();

    document.addEventListener('input', (e) => {
        if (e.target?.id === 'taskSearch') window.__lastSearch = e.target.value;
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.notif-bell') && !e.target.closest('#notifDropdown')) {
            document.getElementById('notifDropdown')?.classList.remove('open');
        }
    });
};

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <header class="bg-white border-b px-8 py-5 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-semibold text-gray-800">Document Vault</h1>
                <p class="text-sm text-gray-500">Browse official templates, forms, and guidelines</p>
            </div>
            <button onclick="window.location.href='/dashboard'" 
                    class="px-5 py-2.5 text-sm font-medium text-gray-600 hover:text-gray-800 transition-colors flex items-center gap-2">
                ← Back to Dashboard
            </button>
        </header>

        <div class="flex-1 overflow-auto p-8">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6" id="foldersGrid">
                <!-- Folders will be populated by JavaScript -->
            </div>
        </div>
    </div>
</div>

<!-- Folder Content Modal -->
<div id="folderModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="modal bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col">
        <div class="px-8 py-6 border-b flex items-center justify-between bg-gray-50 rounded-t-3xl">
            <div class="flex items-center gap-4">
                <span id="modalFolderIcon" class="text-6xl text-amber-600">
                    <i class="fa-solid fa-folder"></i>
                </span>
                <div>
                    <h2 id="modalFolderName" class="text-2xl font-semibold text-gray-800"></h2>
                    <p id="modalFolderDesc" class="text-sm text-gray-500"></p>
                </div>
            </div>
            <button onclick="closeModal()" 
                    class="text-gray-400 hover:text-gray-600 text-3xl leading-none">×</button>
        </div>

        <div class="flex-1 overflow-auto p-8" id="modalContent">
            <!-- Files populated by JS -->
        </div>

        <div class="p-6 border-t bg-gray-50 rounded-b-3xl text-right">
            <button onclick="closeModal()" 
                    class="px-8 py-3 bg-gray-200 hover:bg-gray-300 transition-colors rounded-2xl font-medium">
                Close
            </button>
        </div>
    </div>
</div>

<script>
    // ==================== SUPABASE SETUP ====================
    const supabaseUrl = 'https://uforealazougjckepggc.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmb3JlYWxhem91Z2pja2VwZ2djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjAzODksImV4cCI6MjA5MTgzNjM4OX0.wzGQAiYOuiQjb3gAbaF41yAJJyQ-CCHfMruNUEwfnp0';

    let supabaseClient = null;
    const supabaseLib = window.supabase || window.Supabase;
    if (supabaseLib && typeof supabaseLib.createClient === 'function') {
        supabaseClient = supabaseLib.createClient(supabaseUrl, supabaseAnonKey);
    } else {
        console.error("Supabase client library failed to load.");
        alert("❌ Supabase library failed to load. Please refresh the page.");
    }

    let folders = [];
    let documents = [];
    let currentFolderId = null;

    // ==================== LOAD DATA ====================
    async function loadFolders() {
        const { data: folderData, error: folderError } = await supabaseClient
            .from('folders')
            .select('*')
            .order('name');

        if (folderError) {
            console.error("Load Folders Error:", folderError);
            alert("Error loading folders: " + folderError.message);
            return;
        }

        const { data: documentData, error: documentError } = await supabaseClient
            .from('documents')
            .select('folder_id');

        if (documentError) {
            console.error("Load Document Counts Error:", documentError);
            folders = folderData || [];
            return;
        }

        const countMap = (documentData || []).reduce((acc, doc) => {
            acc[doc.folder_id] = (acc[doc.folder_id] || 0) + 1;
            return acc;
        }, {});

        folders = (folderData || []).map(folder => ({
            ...folder,
            count: countMap[folder.id] || 0
        }));
    }

    async function loadDocumentsByFolder(folderId) {
        const { data, error } = await supabaseClient
            .from('documents')
            .select('*')
            .eq('folder_id', folderId)
            .order('uploaded_at', { ascending: false });

        if (error) console.error(error);
        else documents = data || [];
    }

    // ==================== RENDER ====================
    function renderFolders() {
        const container = document.getElementById('foldersGrid');
        const folderList = Array.isArray(folders) ? folders : [];
        
        if (folderList.length === 0) {
            container.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <div class="text-6xl mb-4">📁</div>
                    <h3 class="text-xl font-semibold text-gray-700 mb-2">No folders yet</h3>
                    <p class="text-gray-500">Documents will appear here once added by administrators.</p>
                </div>
            `;
            return;
        }

        container.innerHTML = folderList.map(folder => {
            const colorMap = {
                'text-amber-600': 'text-amber-600',
                'text-blue-600': 'text-blue-600',
                'text-emerald-600': 'text-emerald-600',
                'text-purple-600': 'text-purple-600',
                'text-rose-600': 'text-rose-600',
                'text-orange-600': 'text-orange-600',
                'text-cyan-600': 'text-cyan-600'
            };
            const color = colorMap[folder.color] || 'text-gray-600';
            const iconClass = folder.icon || 'fa-folder';
            
            return `
                <div onclick="openFolder(${folder.id})" class="folder-card bg-white rounded-3xl p-8 cursor-pointer text-center card-shadow border border-transparent hover:border-gray-200">
                    <div class="text-7xl mb-6 ${color}">
                        <i class="fa-solid ${iconClass}" style="color: inherit;"></i>
                    </div>
                    <h3 class="font-semibold text-xl mb-1">${folder.name}</h3>
                    <p class="text-sm text-gray-500 mb-6">${folder.description || 'No description'}</p>
                    <div class="inline-flex items-center gap-2 px-5 py-2 bg-gray-100 text-gray-600 text-xs font-medium rounded-2xl">
                        ${folder.count || 0} files
                    </div>
                </div>
            `;
        }).join('');
    }

    async function openFolder(folderId) {
        currentFolderId = folderId;
        
        const folder = folders.find(f => f.id === folderId);
        if (!folder) return;

        document.getElementById('modalFolderIcon').innerHTML = `<i class="fa-solid ${folder.icon || 'fa-folder'}" style="color: ${folder.color || '#621708'}"></i>`;
        document.getElementById('modalFolderIcon').className = `text-6xl`;
        document.getElementById('modalFolderName').textContent = folder.name;
        document.getElementById('modalFolderDesc').textContent = folder.description || 'No description';

        await loadDocumentsByFolder(folderId);
        
        const content = document.getElementById('modalContent');
        
        if (!documents || documents.length === 0) {
            content.innerHTML = `
                <div class="text-center py-12">
                    <div class="text-5xl mb-4">📄</div>
                    <h3 class="text-lg font-semibold text-gray-700 mb-2">No documents in this folder</h3>
                    <p class="text-gray-500">Check back later for uploaded documents.</p>
                </div>
            `;
        } else {
            content.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
            
            documents.forEach(doc => {
                const fileIcon = getFileIcon(doc.name);
                const fileSize = formatFileSize(doc.size_bytes);
                const fileType = doc.name.split('.').pop().toUpperCase();
                const uploadedDate = doc.uploaded_at ? new Date(doc.uploaded_at).toLocaleDateString() : 'Unknown';
                
                content.innerHTML += `
                    <div class="bg-gray-50 border border-gray-100 rounded-2xl p-5 flex items-start gap-4">
                        <div class="text-4xl flex-shrink-0">${fileIcon}</div>
                        <div class="flex-1 min-w-0">
                            <p class="font-medium text-gray-800 leading-tight">${doc.name}</p>
                            <p class="text-xs text-gray-500 mt-1">${fileType} • ${fileSize} • ${uploadedDate}</p>
                            
                            <div class="flex gap-3 mt-5">
                                <button onclick="viewDocument(${doc.id})" 
                                        class="flex-1 py-2.5 text-sm font-medium bg-white border border-gray-300 hover:border-gray-400 rounded-2xl transition-colors">
                                    👁️ Preview
                                </button>
                                <button onclick="downloadDocument(${doc.id})" 
                                        class="flex-1 py-2.5 text-sm font-medium bg-[#621708] text-white hover:bg-[#8c2a10] rounded-2xl transition-colors">
                                    ⬇️ Download
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            content.innerHTML += `</div>`;
        }
        
        document.getElementById('folderModal').classList.remove('hidden');
        document.getElementById('folderModal').classList.add('flex');
    }

    // ==================== HELPER FUNCTIONS ====================
    function getFileIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const iconMap = {
            'pdf': '📘',
            'doc': '📝',
            'docx': '📝',
            'xls': '📊',
            'xlsx': '📊',
            'ppt': '📽️',
            'pptx': '📽️',
            'jpg': '🖼️',
            'jpeg': '🖼️',
            'png': '🖼️',
            'gif': '🖼️',
            'zip': '📦',
            'rar': '📦',
            'txt': '📄'
        };
        return iconMap[ext] || '📄';
    }

    function formatFileSize(bytes) {
        if (!bytes) return '0 B';
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(1024));
        return Math.round(bytes / Math.pow(1024, i) * 100) / 100 + ' ' + sizes[i];
    }

    // ==================== DOCUMENT ACTIONS ====================
    async function viewDocument(id) {
        const doc = documents.find(d => d.id === id);
        if (!doc) return;
        
        try {
            const { data, error } = await supabaseClient.storage
                .from('documents')
                .createSignedUrl(doc.file_path, 3600);
            
            if (error) {
                console.error("View Error:", error);
                alert("❌ Error accessing document: " + error.message);
                return;
            }
            
            window.open(data.signedUrl, '_blank');
        } catch (err) {
            console.error("View Error:", err);
            alert("❌ Error viewing document");
        }
    }

    async function downloadDocument(id) {
        const doc = documents.find(d => d.id === id);
        if (!doc) return;
        
        try {
            const { data, error } = await supabaseClient.storage
                .from('documents')
                .createSignedUrl(doc.file_path, 300);
            
            if (error) {
                console.error("Download Error:", error);
                alert("❌ Error downloading document: " + error.message);
                return;
            }
            
            const a = document.createElement('a');
            a.href = data.signedUrl;
            a.download = doc.name;
            a.click();
        } catch (err) {
            console.error("Download Error:", err);
            alert("❌ Error downloading document");
        }
    }

    // ==================== MODAL FUNCTIONS ====================
    function closeModal() {
        const modal = document.getElementById('folderModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        currentFolderId = null;
    }

    // Close modal on escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeModal();
        }
    });

    // Close modal on background click
    document.getElementById('folderModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });

    // ==================== INITIALIZE ====================
    window.onload = async () => {
        if (supabaseClient) {
            await loadFolders();
            renderFolders();
        }
    };
</script>

</body>

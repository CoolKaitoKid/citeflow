<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CTU – Faculty Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" 
        integrity="sha512-x..." crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin: 0;
      position: relative;
    }

    /* Faculty Icon - Top Right Corner */
    .faculty-icon {
      position: fixed;
      top: 25px;
      right: 30px;
      width: 48px;
      height: 48px;
      background: #1e40af;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(30, 64, 175, 0.25);
      transition: all 0.3s ease;
      z-index: 1000;
    }

    .faculty-icon:hover {
      background: #1e3a8a;
      transform: scale(1.08);
    }

    .faculty-icon i {
      transition: transform 0.3s ease;
    }

    .faculty-icon:hover i {
      transform: rotate(12deg);
    }

    .layout {
      width: 90%;
      max-width: 1400px;
      height: 100vh;
      display: flex;
      align-items: center;
      gap: clamp(30px, 4vw, 80px);
      padding: 40px 0;
    }

    .form-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .logo {
      width: clamp(4rem, 5.5vw, 5.125rem);
      height: clamp(4rem, 5.5vw, 5.125rem);
      border-radius: 50%;
      object-fit: contain;
      background: #efefef;
      margin: 0 auto clamp(1rem, 2.2vw, 1.75rem);
      box-shadow: 0 3px 12px rgba(0,0,0,0.07);
    }

    h1 {
      font-size: clamp(1.5rem, 2.2vw, 2rem);
      font-weight: 700;
      color: #000;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: clamp(0.8125rem, 1vw, 0.875rem);
      color: #666;
      margin-bottom: clamp(1.5rem, 3vw, 2.625rem);
    }

    .image-area {
      flex: 1.2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .image-wrapper {
      width: 100%;
      max-width: 100%;
      aspect-ratio: 4 / 4;
      position: relative;
      border-radius: 3.5rem;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.1);
    }

    .image-area img {
      width: 105%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      clip-path: url(#roundedSlant);
    }

    .field {
      margin-bottom: clamp(1.125rem, 2vw, 1.5rem);
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      color: #333;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .input-box {
      height: clamp(3rem, 3vw, 3.25rem);
      background: #ffffff;
      border: 1px solid #bbb;
      border-radius: 0.875rem;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 12px;
      transition: border-color 0.2s;
      position: relative;
    }

    .input-box:focus-within {
      border-color: #1e40af;
      outline: 3px solid rgba(30,64,175,0.1);
      outline-offset: 1px;
    }

    .icon-square {
      width: clamp(2.125rem, 2.5vw, 2.375rem);
      height: clamp(2.125rem, 2.5vw, 2.375rem);
      background: transparent;
      color: #1e40af;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.9375rem, 1.1vw, 1rem);
      flex-shrink: 0;
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 0.875rem;
      font-family: inherit;
      color: #111;
    }

    input::placeholder {
      color: #9a9a9a;
    }

    .password-wrapper {
      position: relative;
    }

    .eye-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      color: #555;
      cursor: pointer;
      padding: 0 4px;
      width: 28px;
      flex-shrink: 0;
      position: absolute;
      right: 12px;
    }

    .options-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8125rem;
      color: #333;
      margin-top: 10px;
    }

    .remember-box {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .forgot-link {
      color: #333;
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      height: clamp(2.8125rem, 3vw, 3.125rem);
      margin-top: clamp(1.125rem, 2vw, 1.5rem);
      background: #1e40af;
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .login-btn:hover {
      background: #1e3a8a;
    }

    .login-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .department-logos {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .dept-logo {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }

    .message {
      margin-top: 12px;
      font-size: 0.85rem;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1200;
      padding: 16px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-card {
      width: 100%;
      max-width: 600px;
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #111827;
    }

    .modal-subtitle {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .modal-actions {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .profile-photo-row {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 4px;
    }

    .profile-preview {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      object-fit: cover;
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 1.8rem;
      overflow: hidden;
    }

    .file-input {
      border: 1px dashed #9ca3af;
      border-radius: 12px;
      padding: 10px;
      width: 100%;
      font-size: 0.82rem;
    }

    .readonly-input {
      color: #6b7280;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #1e40af;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    @media (max-width: 1024px) {
      .layout {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        padding: 40px 0;
      }

      .image-wrapper {
        aspect-ratio: 16 / 9;
        max-height: 50vh;
        min-height: 320px;
        border-radius: 28px;
      }

      .image-area img {
        clip-path: none;
        border-radius: 28px;
      }

      .faculty-icon {
        top: 20px;
        right: 20px;
        width: 44px;
        height: 44px;
        font-size: 1.25rem;
      }
    }

    @media (max-width: 640px) {
      .layout {
        width: 92%;
        padding: 30px 0;
      }

      .logo {
        width: 70px;
        height: 70px;
      }

      h1 {
        font-size: 26px;
      }

      .subtitle {
        margin-bottom: 28px;
      }

      .image-wrapper {
        max-height: 45vh;
      }
    }

    @media (max-width: 640px) {
      .modal-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- SVG CLIP PATH -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <clipPath id="roundedSlant" clipPathUnits="objectBoundingBox">
        <path d="M 0.00 0.10 Q 0.00 0.00 0.10 0.00 L 0.86 0.00 Q 0.96 0.00 0.93 0.14 L 0.78 0.92 Q 0.76 1.00 0.66 1.00 L 0.10 1.00 Q 0.00 1.00 0.00 0.90 Z"/>
      </clipPath>
    </defs>
  </svg>

  <!-- Faculty Icon (Top Right) -->
  <div class="faculty-icon" id="facultyIcon" title="Switch to Admin Login">
    <i class="fas fa-chalkboard-teacher"></i>
  </div>

  <div class="layout">

    <div class="image-area">
      <div class="image-wrapper">
        <img src="bldg1.jpg" alt="University campus building">
      </div>
    </div>

    <div class="form-area">

      <img src="ctu-logo.png" alt="CTU logo" class="logo">

      <h1>Welcome Back, Faculty!</h1>
      <div class="subtitle">Sign in to access your faculty dashboard</div>

      <form id="loginForm">
        <div class="field">
          <label>Faculty ID or Email</label>
          <div class="input-box">
            <div class="icon-square"><i class="far fa-envelope"></i></div>
            <input type="text" id="identifier" placeholder="FAC-2026-000001 or faculty@ctu.edu.ph" required autocomplete="username">
          </div>
        </div>

        <div class="field">
          <label>Password</label>
          <div class="input-box password-wrapper">
            <div class="icon-square"><i class="fas fa-lock"></i></div>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="eye-btn" aria-label="Toggle password visibility">
              <i class="far fa-eye-slash"></i>
            </button>
          </div>
        </div>

        <div class="options-bar">
          <label class="remember-box">
            <input type="checkbox">
            Remember me
          </label>
          <a href="forgot.html" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" id="loginBtn" class="login-btn">Login as Faculty</button>

        <div id="message" class="message" style="display:none;"></div>
      </form>

      <!-- Register section removed as requested -->

      <div class="department-logos">
        <img src="bit_logo.png" alt="BIT Logo" class="dept-logo">
        <img src="bsit_logo.png" alt="BSIT Logo" class="dept-logo">
        <img src="bsie_logo.png" alt="BSIE Logo" class="dept-logo">
      </div>

    </div>

  </div>

  <div id="firstLoginModal" class="modal-backdrop">
    <div class="modal-card">
      <div class="modal-title">Complete Your Profile</div>
      <div class="modal-subtitle">First-time login requires profile completion and a new password before you can enter the faculty dashboard.</div>
      <form id="firstLoginForm">
        <div class="modal-grid">
          <div class="profile-photo-row">
            <div id="setup-photo-preview" class="profile-preview"><i class="fas fa-user"></i></div>
            <div style="flex: 1; text-align: left;">
              <label>Profile Photo <span style="color:#6b7280; font-weight:400;">(optional)</span></label>
              <input type="file" id="setup-photo" class="file-input" accept="image/png,image/jpeg,image/webp">
              <div style="font-size:0.75rem; color:#6b7280; margin-top:4px;">PNG, JPG, or WEBP. You may leave this blank.</div>
            </div>
          </div>

          <div class="field">
            <label>Complete Name</label>
            <div class="input-box">
              <input type="text" id="setup-full-name" required placeholder="Juan Dela Cruz">
            </div>
          </div>
          <div class="field">
            <label>Birthdate</label>
            <div class="input-box">
              <input type="date" id="setup-birthdate" required>
            </div>
          </div>
          <div class="field">
            <label>ID Number / Faculty ID</label>
            <div class="input-box">
              <input type="text" id="setup-employee-id" required placeholder="FAC-2026-000001">
            </div>
          </div>
          <div class="field">
            <label>Existing Email</label>
            <div class="input-box">
              <input type="email" id="setup-existing-email" required placeholder="faculty@ctu.edu.ph">
            </div>
          </div>
          <div class="field">
            <label>Department</label>
            <div class="input-box">
              <input type="text" id="setup-department" required placeholder="BSIT">
            </div>
          </div>
          <div class="field">
            <label>Phone</label>
            <div class="input-box">
              <input type="text" id="setup-phone" placeholder="+63 9xx xxx xxxx">
            </div>
          </div>
          <div class="field">
            <label>Position</label>
            <div class="input-box">
              <input type="text" id="setup-position" placeholder="Instructor">
            </div>
          </div>
          <div class="field">
            <label>New Password</label>
            <div class="input-box">
              <input type="password" id="setup-password" required minlength="8" placeholder="At least 8 characters" autocomplete="new-password">
            </div>
          </div>
          <div class="field">
            <label>Confirm New Password</label>
            <div class="input-box">
              <input type="password" id="setup-confirm-password" required minlength="8" placeholder="Re-enter password" autocomplete="new-password">
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button type="submit" id="firstLoginSubmitBtn" class="btn-primary">Save and Continue</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ================== SUPABASE CONFIG ==================
    const supabaseUrl = 'https://uforealazougjckepggc.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmb3JlYWxhem91Z2pja2VwZ2djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjAzODksImV4cCI6MjA5MTgzNjM4OX0.wzGQAiYOuiQjb3gAbaF41yAJJyQ-CCHfMruNUEwfnp0';

    const { createClient } = supabase;
    const supabaseClient = createClient(supabaseUrl, supabaseAnonKey);

    // Password visibility toggle and first-login profile photo preview
    document.addEventListener('DOMContentLoaded', function() {
      const eyeBtns = document.querySelectorAll('.eye-btn');
      eyeBtns.forEach(btn => {
        const input = btn.parentElement.querySelector('input');
        const icon = btn.querySelector('i');

        btn.addEventListener('click', function() {
          if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
          } else {
            input.type = 'password';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
          }
        });
      });

      const setupPhotoInput = document.getElementById('setup-photo');
      const setupPhotoPreview = document.getElementById('setup-photo-preview');
      setupPhotoInput.addEventListener('change', function() {
        const file = this.files?.[0];
        if (!file) {
          setupPhotoPreview.innerHTML = '<i class="fas fa-user"></i>';
          return;
        }
        if (!file.type.startsWith('image/')) {
          alert('Please choose a valid image file.');
          this.value = '';
          setupPhotoPreview.innerHTML = '<i class="fas fa-user"></i>';
          return;
        }
        const reader = new FileReader();
        reader.onload = (event) => {
          setupPhotoPreview.innerHTML = `<img src="${event.target.result}" alt="Profile preview" style="width:100%;height:100%;object-fit:cover;">`;
        };
        reader.readAsDataURL(file);
      });

      // Faculty Icon Click - Redirect to Admin Login
      const facultyIcon = document.getElementById('facultyIcon');
      facultyIcon.addEventListener('click', function() {
        window.location.href = 'login.html';
      });
    });

    // Login Form Handler with Faculty Profile Check
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const messageDiv = document.getElementById('message');
    const firstLoginModal = document.getElementById('firstLoginModal');
    const firstLoginForm = document.getElementById('firstLoginForm');
    const firstLoginSubmitBtn = document.getElementById('firstLoginSubmitBtn');
    let pendingFirstLoginContext = null;

    function openFirstLoginModal(user, profile) {
      document.getElementById('setup-full-name').value = profile?.full_name || user?.user_metadata?.full_name || '';
      document.getElementById('setup-birthdate').value = profile?.birthdate || user?.user_metadata?.birthdate || '';
      document.getElementById('setup-employee-id').value = profile?.employee_id || user?.user_metadata?.employee_id || '';
      document.getElementById('setup-existing-email').value = profile?.existing_email || profile?.email || user?.email || '';
      document.getElementById('setup-department').value = profile?.department || '';
      document.getElementById('setup-phone').value = profile?.phone || '';
      document.getElementById('setup-position').value = profile?.position || 'Faculty';
      document.getElementById('setup-password').value = '';
      document.getElementById('setup-confirm-password').value = '';
      document.getElementById('setup-photo').value = '';

      const preview = document.getElementById('setup-photo-preview');
      if (profile?.profile_photo_url) {
        preview.innerHTML = `<img src="${profile.profile_photo_url}" alt="Profile photo" style="width:100%;height:100%;object-fit:cover;">`;
      } else {
        preview.innerHTML = '<i class="fas fa-user"></i>';
      }

      firstLoginModal.classList.add('show');
    }

    async function resolveEmailFromIdentifier(identifier) {
      const cleanedIdentifier = identifier.trim();
      if (cleanedIdentifier.includes('@')) {
        return cleanedIdentifier.toLowerCase();
      }

      const { data, error } = await supabaseClient
        .from('faculty')
        .select('email')
        .eq('employee_id', cleanedIdentifier)
        .maybeSingle();

      if (error || !data?.email) {
        throw new Error('No faculty account found for the provided Faculty ID.');
      }
      return String(data.email).toLowerCase();
    }

    async function getFacultyProfileForUser(user) {
      let { data: profile, error: profileError } = await supabaseClient
        .from('faculty')
        .select('*')
        .eq('auth_user_id', user.id)
        .maybeSingle();

      if (profileError) throw profileError;

      // Fallback for older rows created before auth_user_id was saved.
      if (!profile && user.email) {
        const fallback = await supabaseClient
          .from('faculty')
          .select('*')
          .eq('email', user.email.toLowerCase())
          .maybeSingle();

        if (fallback.error) throw fallback.error;
        profile = fallback.data;

        if (profile && !profile.auth_user_id) {
          await supabaseClient
            .from('faculty')
            .update({ auth_user_id: user.id, updated_at: new Date().toISOString() })
            .eq('id', profile.id);
          profile.auth_user_id = user.id;
        }
      }

      return profile;
    }

    async function uploadProfilePhotoIfSelected(userId) {
      const fileInput = document.getElementById('setup-photo');
      const file = fileInput.files?.[0];
      if (!file) return null;

      if (!file.type.startsWith('image/')) {
        throw new Error('Profile photo must be an image file.');
      }
      if (file.size > 2 * 1024 * 1024) {
        throw new Error('Profile photo must be 2 MB or smaller.');
      }

      const extension = (file.name.split('.').pop() || 'jpg').toLowerCase();
      const filePath = `${userId}/${Date.now()}.${extension}`;
      const { error: uploadError } = await supabaseClient.storage
        .from('faculty-profile-photos')
        .upload(filePath, file, { upsert: true, contentType: file.type });

      if (uploadError) {
        throw new Error(`Profile photo upload failed. Make sure the faculty-profile-photos storage bucket exists. ${uploadError.message}`);
      }

      const { data } = supabaseClient.storage
        .from('faculty-profile-photos')
        .getPublicUrl(filePath);

      return data?.publicUrl || null;
    }

    loginForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      messageDiv.style.display = 'none';

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;

      try {
        const email = await resolveEmailFromIdentifier(identifier);

        // Step 1: Sign in with Supabase Auth
        const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (authError) throw authError;

        const user = authData.user;

        // Step 2: Check if user exists in faculty table
        const profile = await getFacultyProfileForUser(user);

        if (!profile) {
          await supabaseClient.auth.signOut();
          throw new Error('This account is not registered as a faculty member. Please contact the administrator.');
        }

        if (String(profile.role || user.user_metadata?.role || '').toLowerCase() !== 'faculty') {
          await supabaseClient.auth.signOut();
          throw new Error('This account is not allowed to login as faculty.');
        }

        const profileCompleted = Boolean(profile.profile_completed ?? user.user_metadata?.profile_completed);
        const mustChangePassword = Boolean(profile.must_change_password ?? user.user_metadata?.must_change_password);

        if (!profileCompleted || mustChangePassword) {
          pendingFirstLoginContext = { user, profile };
          openFirstLoginModal(user, profile);
          showMessage('Complete your profile and set a new password to continue.', 'success');
          return;
        }

        // Successful faculty login
        showMessage(`Welcome back, ${profile.full_name}!`, 'success');

        // Redirect to faculty dashboard
        setTimeout(() => {
          window.location.href = 'faculty/dashboard.html';
        }, 800);

      } catch (err) {
        console.error('Login Error:', err);
        let msg = 'Invalid email or password. Please try again.';

        if (err.message.includes('Invalid login credentials')) {
          msg = 'Incorrect email or password.';
        } else if (err.message.includes('No faculty account found')) {
          msg = err.message;
        } else if (err.message.includes('Email not confirmed')) {
          msg = 'Please confirm your email before logging in.';
        } else if (err.message.includes('not registered as a faculty')) {
          msg = err.message;
        } else if (err.message.includes('Failed to fetch')) {
          msg = 'Network error. Please check your internet connection.';
        }

        showMessage(msg, 'error');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login as Faculty';
      }
    });

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
      messageDiv.style.display = 'block';
    }

    firstLoginForm.addEventListener('submit', async function(event) {
      event.preventDefault();
      if (!pendingFirstLoginContext?.user) return;

      const fullName = document.getElementById('setup-full-name').value.trim();
      const birthdate = document.getElementById('setup-birthdate').value;
      const employeeId = document.getElementById('setup-employee-id').value.trim();
      const existingEmail = document.getElementById('setup-existing-email').value.trim().toLowerCase();
      const department = document.getElementById('setup-department').value.trim();
      const phone = document.getElementById('setup-phone').value.trim();
      const position = document.getElementById('setup-position').value.trim() || 'Faculty';
      const newPassword = document.getElementById('setup-password').value;
      const confirmNewPassword = document.getElementById('setup-confirm-password').value;

      if (!fullName || !birthdate || !employeeId || !existingEmail || !department) {
        alert('Please complete all required profile details.');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(existingEmail)) {
        alert('Please enter a valid existing email address.');
        return;
      }
      if (newPassword.length < 8) {
        alert('New password must be at least 8 characters.');
        return;
      }
      if (newPassword !== confirmNewPassword) {
        alert('New passwords do not match.');
        return;
      }

      firstLoginSubmitBtn.disabled = true;
      firstLoginSubmitBtn.textContent = 'Saving...';

      try {
        const user = pendingFirstLoginContext.user;
        const currentProfile = pendingFirstLoginContext.profile || {};
        const nowIso = new Date().toISOString();
        const uploadedPhotoUrl = await uploadProfilePhotoIfSelected(user.id);
        const profilePhotoUrl = uploadedPhotoUrl || currentProfile.profile_photo_url || null;

        const { error: updateUserError } = await supabaseClient.auth.updateUser({
          password: newPassword,
          data: {
            role: 'Faculty',
            full_name: fullName,
            birthdate,
            employee_id: employeeId,
            existing_email: existingEmail,
            profile_photo_url: profilePhotoUrl,
            profile_completed: true,
            must_change_password: false,
            first_login_completed_at: nowIso
          }
        });
        if (updateUserError) throw updateUserError;

        const profilePayload = {
          auth_user_id: user.id,
          name: fullName,
          full_name: fullName,
          birthdate,
          employee_id: employeeId,
          department,
          phone,
          position,
          email: currentProfile.email || user.email || existingEmail,
          existing_email: existingEmail,
          profile_photo_url: profilePhotoUrl,
          status: 'Active',
          role: 'Faculty',
          profile_completed: true,
          must_change_password: false,
          updated_at: nowIso
        };

        let profileUpdateError = null;
        if (currentProfile.id) {
          const { error } = await supabaseClient
            .from('faculty')
            .update(profilePayload)
            .eq('id', currentProfile.id);
          profileUpdateError = error;
        } else {
          const { error } = await supabaseClient
            .from('faculty')
            .upsert(profilePayload, { onConflict: 'auth_user_id' });
          profileUpdateError = error;
        }
        if (profileUpdateError) throw profileUpdateError;

        firstLoginModal.classList.remove('show');
        pendingFirstLoginContext = null;
        showMessage('Profile completed. Redirecting to your dashboard...', 'success');

        setTimeout(() => {
          window.location.href = 'faculty/dashboard.html';
        }, 900);
      } catch (error) {
        console.error('First login completion failed:', error);
        alert(`Unable to complete first login setup: ${error.message}`);
      } finally {
        firstLoginSubmitBtn.disabled = false;
        firstLoginSubmitBtn.textContent = 'Save and Continue';
      }
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CTU – Forgot Password</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" 
        integrity="sha512-x..." crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: url('bldg1.jpg') center/cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }

    .floating-container {
      position: relative;
      z-index: 2;
      background: white;
      width: 100%;
      max-width: 460px;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      padding: 50px 35px 40px;
      text-align: center;
    }

    /* Overlapping Logo + Lock */
    .logo-lock-container {
      position: relative;
      height: 110px;
      margin-bottom: 15px;
    }

    .ctu-logo {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      object-fit: contain;
      background: #efefef;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      z-index: 1;
    }

    .icon-lock {
      font-size: 4.8rem;
      color: #9c2f1f;
      position: absolute;
      left: 60%;
      top: 38px;
      transform: translateX(-50%);
      z-index: 2;
      filter: drop-shadow(0 4px 8px rgba(156, 47, 31, 0.25));
    }

    h1 {
      font-size: 1.85rem;
      font-weight: 700;
      color: #000;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.5;
      margin-bottom: 25px;
    }

    .field {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.84rem;
      color: #333;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .input-box {
      height: 54px;
      background: #ffffff;
      border: 1px solid #ccc;
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      transition: all 0.2s;
    }

    .input-box:focus-within {
      border-color: #9c2f1f;
      box-shadow: 0 0 0 4px rgba(156, 47, 31, 0.12);
    }

    .icon-square {
      width: 38px;
      height: 38px;
      background: #f8f8f8;
      color: #9c2f1f;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 1rem;
      color: #111;
    }

    .reset-btn {
      width: 100%;
      height: 54px;
      margin: 8px 0 15px;
      background: #9c2f1f;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.02rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .reset-btn:hover {
      background: #84261a;
    }

    .back-link {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #555;
    }

    .back-link a {
      color: #9c2f1f;
      font-weight: 600;
      text-decoration: none;
    }

    .success-message {
      display: none;
      background: #f0fdf4;
      color: #166534;
      padding: 14px 18px;
      border-radius: 12px;
      margin: 15px 0;
      font-size: 0.93rem;
      text-align: center;
    }

    .department-logos {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .dept-logo {
      width: 42px;
      height: 42px;
      object-fit: contain;
      opacity: 0.85;
    }

    .dept-logo:hover {
      opacity: 1;
    }

    /* Loading state for button */
    .reset-btn:disabled {
      background: #b36b5f;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

   <div class="floating-container">

    <!-- Logo + Lock -->
    <div class="logo-lock-container">
      <img src="ctu-logo.png" alt="CTU logo" class="ctu-logo">
      <i class="fas fa-lock icon-lock"></i>
    </div>

    <h1 id="title">Forgot Password?</h1>
    <div id="subtitle" class="subtitle">
      Enter your registered email and we'll send you an 8-digit verification code.
    </div>

    <form id="forgotForm">

      <!-- Step 1: Email -->
      <div id="emailStep">
        <div class="field">
          <label>Email Address</label>
          <div class="input-box">
            <div class="icon-square"><i class="far fa-envelope"></i></div>
            <input type="email" id="email" placeholder="name@ctu.edu.ph" required autocomplete="email">
          </div>
        </div>
        <button type="button" id="sendBtn" class="reset-btn">Send Verification Code</button>
      </div>

      <!-- Step 2: OTP -->
      <div id="otpStep" style="display: none;">
        <div class="field">
          <label>Verification Code</label>
          <div class="input-box">
            <div class="icon-square"><i class="fas fa-key"></i></div>
            <input type="text" id="otp" placeholder="Enter 8-digit code" maxlength="8" inputmode="numeric" pattern="[0-9]{8}" required>
          </div>
        </div>
        <button type="button" id="verifyBtn" class="reset-btn">Verify Code</button>
        <p style="margin-top: 12px; font-size: 0.85rem; color: #666;">
          Didn't receive the code? 
          <a href="#" id="resendLink" style="color: #9c2f1f; text-decoration: none;">Resend</a>
        </p>
      </div>

      <!-- Step 3: Reset Password -->
      <div id="resetStep" style="display: none;">
        <div class="field">
          <label>New Password</label>
          <div class="input-box">
            <div class="icon-square"><i class="fas fa-lock"></i></div>
            <input type="password" id="newPassword" placeholder="At least 8 characters" minlength="8" autocomplete="new-password">
          </div>
        </div>
        <div class="field">
          <label>Confirm New Password</label>
          <div class="input-box">
            <div class="icon-square"><i class="fas fa-lock"></i></div>
            <input type="password" id="confirmPassword" placeholder="Re-enter password" minlength="8" autocomplete="new-password">
          </div>
        </div>
        <button type="button" id="resetBtn" class="reset-btn">Reset Password</button>
      </div>

      <div id="successMsg" class="success-message">
        ✅ Verification code has been sent to your email.<br>
        Please check your inbox (and spam folder).
      </div>

    </form>

    <div class="back-link">
      Remember your password? <a href="login.html">Back to Login</a>
    </div>

    <!-- Department Logos -->
    <div class="department-logos">
      <img src="bit_logo.png" alt="BIT Logo" class="dept-logo">
      <img src="bsit_logo.png" alt="BSIT Logo" class="dept-logo">
      <img src="bsie_logo.png" alt="BSIE Logo" class="dept-logo">
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="forgot-password.js"></script>

</body>
</html>

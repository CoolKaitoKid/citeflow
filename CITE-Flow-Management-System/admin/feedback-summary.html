<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seminar Feedback Summary - CITE-Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        
        .card-shadow { 
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05); 
        }
        
        .sidebar { 
            background-color: #621708; 
            width: 280px;
        }
        
        .nav-item { 
            transition: all 0.3s ease; 
        }
        .nav-item:hover { 
            background-color: #8c2a10; 
        }
        .nav-item.active { 
            background-color: #8c2a10; 
            border-left: 4px solid #f5e8c7; 
        }

        .section-header {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            opacity: 0.75;
            padding-left: 20px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-gray-50">

<div class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <div class="sidebar text-white flex flex-col h-full">
        <div onclick="window.location.href='dashboard.html'" 
             class="px-6 pt-8 pb-6 cursor-pointer hover:bg-white/10 transition-colors flex flex-col items-center border-b border-white/10">
            <img src="ctu-logo.png" alt="CTU Logo" class="h-16 w-auto mb-3">
            <div class="text-center">
                <div class="font-semibold text-base leading-tight">College of Technology</div>
                <div class="font-semibold text-base leading-tight">and Engineering</div>
            </div>
        </div>

        <div class="flex-1 sidebar-scroll overflow-y-auto py-8 px-4 space-y-8">
            <div>
                <div class="section-header text-white/70">ADMINISTRATION</div>
                <div onclick="window.location.href='dashboard.html'" 
                     class="nav-item flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    ← Back to Dashboard
                </div>
                <div onclick="window.location.href='feedback-summary.html'" 
                     class="nav-item flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer bg-[#8c2a10] border-l-4 border-[#f5e8c7]">
                    📋 Seminar Feedback Summary
                </div>
            </div>
        </div>

        <div onclick="window.location.href='admin-profile.html'" 
             class="mx-4 mb-6 bg-white/10 rounded-3xl p-4 flex items-center gap-x-3 hover:bg-white/20 transition-colors cursor-pointer">
            <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-[#621708] text-xl">👤</div>
            <div class="flex-1 min-w-0">
                <div class="font-semibold text-sm truncate">Maria Santos</div>
                <div class="text-xs text-white/70">Dean & Administrator</div>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 overflow-y-auto p-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-semibold">Seminar Feedback Summary</h1>
                    <p class="text-gray-500">Faculty responses and satisfaction analysis</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="refreshData()" 
                            class="px-6 py-3 bg-[#621708] text-white rounded-2xl hover:bg-[#4a1206] font-medium flex items-center gap-2">
                        🔄 Refresh
                    </button>
                    <button onclick="clearAllData()" 
                            class="px-6 py-3 bg-red-100 text-red-700 rounded-2xl hover:bg-red-200 font-medium">
                        🗑️ Clear Data
                    </button>
                </div>
            </div>

            <!-- Statistics Cards -->
            <div class="grid grid-cols-4 gap-6 mb-10" id="stats-cards">
                <!-- JS populated -->
            </div>

            <div class="grid grid-cols-12 gap-6">
                <!-- Pie Chart -->
                <div class="col-span-5 bg-white rounded-3xl p-8 card-shadow">
                    <h2 class="text-xl font-semibold mb-6">Satisfaction Distribution</h2>
                    <div class="flex justify-center">
                        <div class="w-80 h-80">
                            <canvas id="satisfactionPie"></canvas>
                        </div>
                    </div>
                    <div class="mt-8 grid grid-cols-2 gap-4 text-sm" id="legend">
                        <!-- JS populated -->
                    </div>
                </div>

                <!-- Feedback Table -->
                <div class="col-span-7 bg-white rounded-3xl p-6 card-shadow">
                    <h2 class="text-xl font-semibold mb-6">All Submitted Feedback</h2>
                    <div id="feedback-table" class="overflow-x-auto">
                        <!-- JS populated -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let pieChart = null;

function loadFeedbacks() {
    let feedbacks = JSON.parse(localStorage.getItem('seminarFeedbacks') || '[]');
    
    // Statistics
    const totalResponses = feedbacks.length;
    let totalScore = 0;
    let attendedCount = 0;

    const satisfactionCounts = {
        "Very Satisfied": 0,
        "Satisfied": 0,
        "Neutral": 0,
        "Not Satisfied": 0
    };

    const scoreMap = {
        "Very Satisfied": 5,
        "Satisfied": 4,
        "Neutral": 3,
        "Not Satisfied": 2
    };

    feedbacks.forEach(fb => {
        if (fb.attended) attendedCount++;
        if (satisfactionCounts[fb.satisfaction] !== undefined) {
            satisfactionCounts[fb.satisfaction]++;
            totalScore += scoreMap[fb.satisfaction] || 0;
        }
    });

    const averageSatisfaction = totalResponses > 0 ? (totalScore / totalResponses).toFixed(1) : 0;
    const attendanceRate = totalResponses > 0 ? Math.round((attendedCount / totalResponses) * 100) : 0;

    // Render Stats Cards
    document.getElementById('stats-cards').innerHTML = `
        <div class="bg-white rounded-3xl p-6 card-shadow">
            <div class="text-gray-500 text-sm">Total Responses</div>
            <div class="text-5xl font-semibold mt-3">${totalResponses}</div>
        </div>
        <div class="bg-white rounded-3xl p-6 card-shadow">
            <div class="text-gray-500 text-sm">Avg. Satisfaction</div>
            <div class="text-5xl font-semibold mt-3 text-amber-600">${averageSatisfaction}/5</div>
        </div>
        <div class="bg-white rounded-3xl p-6 card-shadow">
            <div class="text-gray-500 text-sm">Attendance Rate</div>
            <div class="text-5xl font-semibold mt-3 text-emerald-600">${attendanceRate}%</div>
        </div>
        <div class="bg-white rounded-3xl p-6 card-shadow">
            <div class="text-gray-500 text-sm">Last Submitted</div>
            <div class="text-lg font-medium mt-3">
                ${totalResponses > 0 ? new Date(feedbacks[feedbacks.length-1].timestamp).toLocaleDateString() : '—'}
            </div>
        </div>
    `;

    // Render Pie Chart
    renderPieChart(satisfactionCounts);

    // Render Table
    const tableContainer = document.getElementById('feedback-table');
    
    if (totalResponses === 0) {
        tableContainer.innerHTML = `<div class="text-center py-16 text-gray-400">No feedback submitted yet from faculty.</div>`;
        return;
    }

    let html = `
        <table class="w-full">
            <thead>
                <tr class="border-b text-left text-sm text-gray-500">
                    <th class="py-5 px-6 font-medium">Seminar</th>
                    <th class="py-5 px-6 font-medium">Faculty</th>
                    <th class="py-5 px-6 font-medium">Satisfaction</th>
                    <th class="py-5 px-6 font-medium">Comment</th>
                    <th class="py-5 px-6 font-medium">Date</th>
                </tr>
            </thead>
            <tbody class="divide-y">
    `;

    feedbacks.forEach(fb => {
        const satClass = fb.satisfaction === "Very Satisfied" ? "bg-green-100 text-green-700" :
                        fb.satisfaction === "Satisfied" ? "bg-blue-100 text-blue-700" :
                        fb.satisfaction === "Neutral" ? "bg-yellow-100 text-yellow-700" : 
                        "bg-red-100 text-red-700";

        html += `
            <tr class="hover:bg-gray-50">
                <td class="py-5 px-6 font-medium">${fb.eventTitle}</td>
                <td class="py-5 px-6">${fb.facultyName}</td>
                <td class="py-5 px-6">
                    <span class="px-5 py-1.5 rounded-2xl text-sm font-medium ${satClass}">
                        ${fb.satisfaction}
                    </span>
                </td>
                <td class="py-5 px-6 text-gray-600">${fb.comment}</td>
                <td class="py-5 px-6 text-sm text-gray-500">
                    ${new Date(fb.timestamp).toLocaleDateString('en-US', {month:'short', day:'numeric'})}
                </td>
            </tr>
        `;
    });

    html += `</tbody></table>`;
    tableContainer.innerHTML = html;
}

function renderPieChart(counts) {
    const ctx = document.getElementById('satisfactionPie');
    
    if (pieChart) pieChart.destroy();

    const data = Object.values(counts);
    const labels = Object.keys(counts);
    const colors = ['#22c55e', '#3b82f6', '#eab308', '#ef4444'];

    pieChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: data,
                backgroundColor: colors,
                borderWidth: 0,
                cutout: '65%'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: (context) => `${context.label}: ${context.raw} responses`
                    }
                }
            }
        }
    });

    // Render Legend
    let legendHTML = '';
    labels.forEach((label, i) => {
        if (data[i] > 0) {
            legendHTML += `
                <div class="flex items-center gap-3">
                    <div class="w-4 h-4 rounded" style="background-color: ${colors[i]}"></div>
                    <span class="text-gray-700">${label}</span>
                    <span class="ml-auto font-medium">${data[i]}</span>
                </div>`;
        }
    });
    document.getElementById('legend').innerHTML = legendHTML || '<p class="text-gray-400">No data yet</p>';
}

function refreshData() {
    loadFeedbacks();
}

function clearAllData() {
    if (confirm("Clear ALL feedback data? This action cannot be undone.")) {
        localStorage.removeItem('seminarFeedbacks');
        loadFeedbacks();
    }
}

// Initialize
window.onload = loadFeedbacks;
</script>
</body>
</html>

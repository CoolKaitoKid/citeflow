<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Vault | CTU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        .sidebar { 
            background-color: #621708; 
            width: 280px;
        }
        
        .nav-item { 
            transition: all 0.2s ease; 
        }
        .nav-item:hover { 
            background-color: #8c2a10; 
        }
        .nav-item.active { 
            background-color: #8c2a10; 
            border-left: 4px solid #f5e8c7; 
        }

        .section-header {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0.75;
            padding-left: 20px;
            margin-bottom: 8px;
        }

        .sidebar-scroll::-webkit-scrollbar { 
            width: 4px; 
        }
        .sidebar-scroll::-webkit-scrollbar-thumb { 
            background-color: rgba(255,255,255,0.3); 
            border-radius: 20px; 
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .card-shadow { 
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05); 
        }

        .folder-card {
            transition: all 0.25s ease;
        }
        .folder-card:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.12);
        }

        .modal {
            animation: fadeInScale 0.2s ease forwards;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-50">

<div class="flex h-screen overflow-hidden">

    <!-- SIDEBAR (unchanged) -->
    <div class="sidebar text-white flex flex-col h-full">
        <!-- Logo Area -->
        <div onclick="window.location.href='/dashboard'" 
             class="px-6 pt-8 pb-6 cursor-pointer hover:bg-white/10 transition-colors flex flex-col items-center border-b border-white/10">
            <img src="ctu-logo.png" alt="CTU Logo" class="h-16 w-auto mb-3">
            <div class="text-center">
                <div class="font-semibold text-base leading-tight">College of Technology</div>
                <div class="font-semibold text-base leading-tight">and Engineering</div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex-1 sidebar-scroll overflow-y-auto py-8 px-4 space-y-8">
            <div>
                <div class="section-header text-white/70">DOCUMENT MANAGEMENT</div>
                <div onclick="window.location.href='/document-vault'" 
                     class="nav-item active flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    <svg class="nav-icon" fill="none" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
                    Document Vault
                </div>
                <div onclick="window.location.href='/submissions'" 
                     class="nav-item flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    <svg class="nav-icon" fill="none" viewBox="0 0 24 24"><path d="M12 3v18"/><path d="M4 8l8-5 8 5"/><path d="M4 16l8 5 8-5"/></svg>
                    Submissions
                </div>
                <div onclick="window.location.href='/status'" 
                     class="nav-item flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    <svg class="nav-icon" fill="none" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9-6-18-3 9H2"/></svg>
                    Submission Status
                </div>
            </div>

            <div>
                <div class="section-header text-white/70">EVENTS</div>
                <div onclick="window.location.href='/calendar'" class="nav-item flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    <svg class="nav-icon" fill="none" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    Calendar
                </div>
            </div>

            <div>
                <div class="section-header text-white/70">SYSTEM</div>
                <div onclick="window.location.href='/system-settings'" class="nav-item flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    <svg class="nav-icon" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    System Settings
                </div>
            </div>
        </div>

        <!-- Profile -->
        <div onclick="window.location.href='/faculty-profile'" 
             class="mx-4 mb-6 bg-white/10 rounded-3xl p-4 flex items-center gap-x-3 hover:bg-white/20 transition-colors cursor-pointer">
            <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-[#621708] text-xl">👤</div>
            <div class="flex-1 min-w-0">
                <div class="font-semibold text-sm truncate">Princess A.</div>
                <div class="text-xs text-white/70">Faculty Member</div>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <header class="bg-white border-b px-8 py-5 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-semibold text-gray-800">Document Vault</h1>
                <p class="text-sm text-gray-500">Browse official templates, forms, and guidelines</p>
            </div>
            <button onclick="window.location.href='/dashboard'" 
                    class="px-5 py-2.5 text-sm font-medium text-gray-600 hover:text-gray-800 transition-colors flex items-center gap-2">
                ← Back to Dashboard
            </button>
        </header>

        <div class="flex-1 overflow-auto p-8">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6" id="foldersGrid">
                <!-- Folders will be populated by JavaScript -->
            </div>
        </div>
    </div>
</div>

<!-- Folder Content Modal -->
<div id="folderModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="modal bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col">
        <div class="px-8 py-6 border-b flex items-center justify-between bg-gray-50 rounded-t-3xl">
            <div class="flex items-center gap-4">
                <span id="modalFolderIcon" class="text-5xl"></span>
                <div>
                    <h2 id="modalFolderName" class="text-2xl font-semibold text-gray-800"></h2>
                    <p id="modalFolderDesc" class="text-sm text-gray-500"></p>
                </div>
            </div>
            <button onclick="closeModal()" 
                    class="text-gray-400 hover:text-gray-600 text-3xl leading-none">×</button>
        </div>

        <div class="flex-1 overflow-auto p-8" id="modalContent">
            <!-- Files populated by JS -->
        </div>

        <div class="p-6 border-t bg-gray-50 rounded-b-3xl text-right">
            <button onclick="closeModal()" 
                    class="px-8 py-3 bg-gray-200 hover:bg-gray-300 transition-colors rounded-2xl font-medium">
                Close
            </button>
        </div>
    </div>
</div>

<script>
// Folder Data
const folders = [
    {
        id: 1,
        name: "Templates",
        icon: "🗁",
        color: "text-amber-600",
        bg: "bg-amber-100",
        desc: "Ready-to-use document templates",
        category: "template",
        files: [
            { name: "Research Proposal Template", type: "PDF", size: "248 KB", icon: "📘" },
            { name: "Syllabus Template 2026", type: "DOCX", size: "312 KB", icon: "📝" },
            { name: "Lesson Plan Template", type: "DOCX", size: "189 KB", icon: "📋" },
            { name: "Faculty CV Template", type: "DOCX", size: "156 KB", icon: "📄" }
        ]
    },
    {
        id: 2,
        name: "Forms",
        icon: "🗁",
        color: "text-blue-600",
        bg: "bg-blue-100",
        desc: "Official administrative forms",
        category: "form",
        files: [
            { name: "Faculty Leave Application", type: "PDF", size: "142 KB", icon: "📋" },
            { name: "Travel Authorization Form", type: "PDF", size: "98 KB", icon: "✈️" },
            { name: "Faculty Load Adjustment", type: "DOCX", size: "134 KB", icon: "📊" }
        ]
    },
    {
        id: 3,
        name: "Guidelines & Policies",
        icon: "🗁",
        color: "text-emerald-600",
        bg: "bg-emerald-100",
        desc: "College policies and guidelines",
        category: "guideline",
        files: [
            { name: "Faculty Performance Evaluation 2026", type: "PDF", size: "1.4 MB", icon: "📜" },
            { name: "Research Ethics Guidelines", type: "PDF", size: "875 KB", icon: "⚖️" },
            { name: "Promotion and Tenure Policy", type: "PDF", size: "2.1 MB", icon: "🏆" }
        ]
    },
    {
        id: 4,
        name: "Administrative Reports",
        icon: "🗁",
        color: "text-purple-600",
        bg: "bg-purple-100",
        desc: "Report formats and examples",
        category: "report",
        files: [
            { name: "Annual Faculty Accomplishment Report", type: "DOCX", size: "289 KB", icon: "📈" },
            { name: "Departmental Summary Template", type: "XLSX", size: "456 KB", icon: "📊" }
        ]
    },
    {
        id: 5,
        name: "Meeting & Minutes",
        icon: "🗁",
        color: "text-rose-600",
        bg: "bg-rose-100",
        desc: "Templates for meetings and documentation",
        category: "meeting",
        files: [
            { name: "Faculty Meeting Agenda Template", type: "DOCX", size: "87 KB", icon: "📅" },
            { name: "Minutes Template", type: "DOCX", size: "92 KB", icon: "🗒️" }
        ]
    }
];

// Render Folders
function renderFolders() {
    const container = document.getElementById('foldersGrid');
    container.innerHTML = '';

    folders.forEach(folder => {
        const div = document.createElement('div');
        div.className = `folder-card bg-white rounded-3xl p-8 cursor-pointer text-center card-shadow border border-transparent hover:border-gray-200`;
        div.innerHTML = `
            <div class="text-7xl mb-6 ${folder.color}">${folder.icon}</div>
            <h3 class="font-semibold text-xl mb-1">${folder.name}</h3>
            <p class="text-sm text-gray-500 mb-6">${folder.desc}</p>
            <div class="inline-flex items-center gap-2 px-5 py-2 bg-gray-100 text-gray-600 text-xs font-medium rounded-2xl">
                ${folder.files.length} files
            </div>
        `;
        div.onclick = () => openFolder(folder);
        container.appendChild(div);
    });
}

// Open Folder Modal
function openFolder(folder) {
    document.getElementById('modalFolderIcon').textContent = folder.icon;
    document.getElementById('modalFolderIcon').className = `text-6xl ${folder.color}`;
    document.getElementById('modalFolderName').textContent = folder.name;
    document.getElementById('modalFolderDesc').textContent = folder.desc;

    const content = document.getElementById('modalContent');
    content.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;

    folder.files.forEach(file => {
        const isTemplate = folder.category === 'template';
        
        content.innerHTML += `
            <div class="bg-gray-50 border border-gray-100 rounded-2xl p-5 flex items-start gap-4">
                <div class="text-4xl flex-shrink-0">${file.icon}</div>
                <div class="flex-1 min-w-0">
                    <p class="font-medium text-gray-800 leading-tight">${file.name}</p>
                    <p class="text-xs text-gray-500 mt-1">${file.type} • ${file.size}</p>
                    
                    <div class="flex gap-3 mt-5">
                        ${isTemplate ? `
                        <button onclick="previewFile('${file.name}')" 
                                class="flex-1 py-2.5 text-sm font-medium bg-white border border-gray-300 hover:border-gray-400 rounded-2xl transition-colors">
                            👁️ Preview
                        </button>` : ''}
                        
                        <button onclick="downloadFile('${file.name}')" 
                                class="flex-1 py-2.5 text-sm font-medium bg-[#621708] text-white hover:bg-[#8c2a10] rounded-2xl transition-colors">
                            ⬇️ Download
                        </button>
                    </div>
                </div>
            </div>
        `;
    });

    content.innerHTML += `</div>`;
    document.getElementById('folderModal').classList.remove('hidden');
    document.getElementById('folderModal').classList.add('flex');
}

// Close Modal
function closeModal() {
    const modal = document.getElementById('folderModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
}

// Actions
function previewFile(filename) {
    alert(`Previewing: ${filename}\n\n(In a real system, this would open a PDF viewer or document preview modal.)`);
}

function downloadFile(filename) {
    alert(`Downloading: ${filename}\n\n(The file would be downloaded in a real implementation.)`);
}

// Initialize
renderFolders();
</script>

</body>
</html>

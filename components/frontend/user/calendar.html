<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - CTU CITE Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        :root {
            --primary-color: #621708;
            --primary-dark: #4a1206;
            --accent-light: #f5e8c7;
        }

        .sidebar { 
            background-color: var(--primary-color); 
            width: 280px;
            transition: background-color 0.4s ease;
        }
        
        .nav-item { 
            transition: all 0.25s ease; 
        }
        .nav-item:hover { 
            background-color: var(--primary-dark); 
        }
        .nav-item.active { 
            background-color: var(--primary-dark); 
            border-left: 4px solid var(--accent-light); 
        }

        .section-header {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0.75;
            padding-left: 20px;
            margin-bottom: 8px;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .calendar-day {
            min-height: 110px;
            padding: 10px;
            border-radius: 12px;
            transition: all 0.2s ease;
            background: #f9fafb;
        }
        .calendar-day:hover {
            background: #fefce8;
            transform: translateY(-2px);
        }
        .calendar-day.today {
            background: #fef3c7;
            border: 2px solid var(--primary-color);
        }

        .event-pill {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 9999px;
            margin-top: 4px;
            color: white;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-scroll::-webkit-scrollbar { 
            width: 4px; 
        }
        .sidebar-scroll::-webkit-scrollbar-thumb { 
            background-color: rgba(255,255,255,0.3); 
            border-radius: 20px; 
        }

        .card-shadow {
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.08);
        }
    </style>
</head>
<body class="bg-gray-50">

<div class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <div class="sidebar text-white flex flex-col h-full">

        <!-- Top Logo Area -->
        <div onclick="window.location.href='/dashboard'" 
             class="px-6 pt-8 pb-6 cursor-pointer hover:bg-white/10 transition-colors flex flex-col items-center border-b border-white/10">
            <img src="ctu-logo.png" alt="CTU Logo" class="h-16 w-auto mb-3">
            <div class="text-center">
                <div class="font-semibold text-base leading-tight">College of Technology</div>
                <div class="font-semibold text-base leading-tight">and Engineering</div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex-1 sidebar-scroll overflow-y-auto py-8 px-4 space-y-8">

            <!-- DOCUMENT MANAGEMENT -->
            <div>
                <div class="section-header text-white/70">DOCUMENT MANAGEMENT</div>
                <div onclick="window.location.href='/document-vault'" 
                     class="nav-item flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    <svg class="nav-icon" fill="none" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
                    Document Vault
                </div>
                <div onclick="window.location.href='/submissions'" 
                     class="nav-item flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    <svg class="nav-icon" fill="none" viewBox="0 0 24 24"><path d="M12 3v18"/><path d="M4 8l8-5 8 5"/><path d="M4 16l8 5 8-5"/></svg>
                    Submissions
                </div>
                <div onclick="window.location.href='/status'" 
                     class="nav-item flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    <svg class="nav-icon" fill="none" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9-6-18-3 9H2"/></svg>
                    Submission Status
                </div>
            </div>

            <!-- EVENTS -->
            <div>
                <div class="section-header text-white/70">EVENTS</div>
                <div onclick="window.location.href='/calendar'" 
                     class="nav-item active flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    <svg class="nav-icon" fill="none" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    Calendar
                </div>
            </div>

            <!-- SYSTEM -->
            <div>
                <div class="section-header text-white/70">SYSTEM</div>
                <div onclick="window.location.href='/system-settings'" 
                     class="nav-item flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    <svg class="nav-icon" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    System Settings
                </div>
            </div>

        </div>

        <!-- Bottom Profile -->
        <div onclick="window.location.href='/faculty-profile'" 
             class="mx-4 mb-6 bg-white/10 rounded-3xl p-4 flex items-center gap-x-3 hover:bg-white/20 transition-colors cursor-pointer">
            <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-[#621708] text-xl">👤</div>
            <div class="flex-1 min-w-0">
                <div class="font-semibold text-sm truncate">Princess A.</div>
                <div class="text-xs text-white/70">Faculty Member</div>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 overflow-auto p-8 bg-gray-50">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-semibold text-gray-800">Academic Calendar</h1>
                    <p class="text-gray-500 mt-1">Stay updated with important dates and events</p>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="prevMonth()" 
                            class="w-10 h-10 flex items-center justify-center bg-white rounded-2xl shadow hover:bg-gray-100 transition-colors text-xl">←</button>
                    <div class="text-center min-w-[180px]">
                        <span id="currentMonth" class="text-2xl font-semibold"></span>
                        <span id="currentYear" class="text-2xl text-gray-400 ml-2"></span>
                    </div>
                    <button onclick="nextMonth()" 
                            class="w-10 h-10 flex items-center justify-center bg-white rounded-2xl shadow hover:bg-gray-100 transition-colors text-xl">→</button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

                <!-- Calendar Grid -->
                <div class="lg:col-span-8 bg-white rounded-3xl p-6 card-shadow">
                    <div class="grid grid-cols-7 text-center text-xs font-medium text-gray-500 mb-4">
                        <div class="py-2">Sun</div>
                        <div class="py-2">Mon</div>
                        <div class="py-2">Tue</div>
                        <div class="py-2">Wed</div>
                        <div class="py-2">Thu</div>
                        <div class="py-2">Fri</div>
                        <div class="py-2">Sat</div>
                    </div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
                </div>

                <!-- Upcoming Events -->
                <div class="lg:col-span-4">
                    <div class="bg-white rounded-3xl p-6 card-shadow h-full">
                        <h2 class="font-semibold text-lg mb-5 flex items-center gap-2">
                            <span>📅</span> Upcoming Events
                        </h2>
                        <div id="upcomingEvents" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Event Detail Modal -->
<div id="viewModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl w-full max-w-md mx-4 overflow-hidden">
        <div class="px-6 py-5 border-b flex justify-between items-center">
            <h3 class="font-semibold text-lg">Event Details</h3>
            <button onclick="closeModal()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
        </div>
        <div id="viewContent" class="p-6 space-y-5"></div>
    </div>
</div>

<script>
    let currentDate = new Date();
    let events = [];

    const colors = {
        "#621708": { dark: "#4a1206", accent: "#f5e8c7" },
        "#21130d": { dark: "#1a0f0a", accent: "#e8d5c0" },
        "#1a1a1a": { dark: "#111111", accent: "#d1d5db" },
        "#60a5fa": { dark: "#3b82f6", accent: "#dbeafe" },
        "#4ade80": { dark: "#22c55e", accent: "#f0fdf4" },
        "#ffddef": { dark: "#e8b8d0", accent: "#4b2e3d" },
        "#14b8a6": { dark: "#0f766e", accent: "#ccfbf1" },
        "#f97316": { dark: "#c2410c", accent: "#fef3c7" }
    };

    function applyTheme(color) {
        const config = colors[color] || colors["#621708"];
        document.documentElement.style.setProperty('--primary-color', color);
        document.documentElement.style.setProperty('--primary-dark', config.dark);
        document.documentElement.style.setProperty('--accent-light', config.accent);
        localStorage.setItem('ctu_primary_color', color);
    }

    function loadEvents() {
        const saved = localStorage.getItem('citeCalendarEvents');
        if (saved) {
            events = JSON.parse(saved);
        } else {
            events = [
                { id: 1, title: "Midterm Examination", date: "2026-04-10", time: "08:00", color: "#ef4444", desc: "BSIT & BSCS Midterms" },
                { id: 2, title: "Faculty Meeting", date: "2026-04-12", time: "10:00", color: "#3b82f6", desc: "Monthly Department Meeting" },
                { id: 3, title: "Research Presentation", date: "2026-04-15", time: "13:00", color: "#10b981", desc: "CITE Research Forum" },
                { id: 4, title: "Holiday - Labor Day", date: "2026-05-01", time: "", color: "#8b5cf6" }
            ];
            localStorage.setItem('citeCalendarEvents', JSON.stringify(events));
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";

        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();

        const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        document.getElementById('currentMonth').textContent = monthNames[month];
        document.getElementById('currentYear').textContent = year;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // Empty slots
        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.className = "h-28";
            grid.appendChild(empty);
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const dayEvents = events.filter(e => e.date === dateStr);

            const isToday = dateStr === new Date().toISOString().split('T')[0];

            const div = document.createElement('div');
            div.className = `calendar-day border border-gray-100 cursor-pointer ${isToday ? 'today' : ''}`;
            
            let eventsHTML = '';
            if (dayEvents.length > 0) {
                eventsHTML = dayEvents.slice(0, 3).map(e => `
                    <div class="event-pill" style="background-color: ${e.color}">
                        ${e.title}
                    </div>
                `).join('');
            }

            div.innerHTML = `
                <div class="font-semibold text-sm ${isToday ? 'text-amber-700' : 'text-gray-700'}">${day}</div>
                ${eventsHTML}
            `;

            div.onclick = () => showEventDetails(dayEvents, dateStr);
            grid.appendChild(div);
        }
    }

    function showEventDetails(dayEvents, dateStr) {
        if (dayEvents.length === 0) return;

        const container = document.getElementById('viewContent');
        container.innerHTML = `<div class="text-sm text-gray-500 mb-4">${dateStr}</div>`;

        dayEvents.forEach(e => {
            const div = document.createElement('div');
            div.className = "flex gap-4 border-l-4 pl-4 py-1";
            div.style.borderColor = e.color;
            div.innerHTML = `
                <div class="flex-1">
                    <div class="font-semibold">${e.title}</div>
                    ${e.time ? `<div class="text-xs text-gray-500 mt-1">🕒 ${e.time}</div>` : ''}
                    ${e.desc ? `<div class="text-xs text-gray-600 mt-2">${e.desc}</div>` : ''}
                </div>
            `;
            container.appendChild(div);
        });

        document.getElementById('viewModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('viewModal').classList.add('hidden');
    }

    function renderUpcoming() {
        const container = document.getElementById('upcomingEvents');
        container.innerHTML = "";

        const today = new Date().toISOString().split('T')[0];
        const upcoming = events
            .filter(e => e.date >= today)
            .sort((a, b) => a.date.localeCompare(b.date))
            .slice(0, 5);

        if (upcoming.length === 0) {
            container.innerHTML = `<div class="text-gray-400 text-center py-8">No upcoming events</div>`;
            return;
        }

        upcoming.forEach(e => {
            const div = document.createElement('div');
            div.className = "bg-white border border-gray-100 rounded-2xl p-4 hover:border-gray-300 transition-colors";
            div.innerHTML = `
                <div class="flex items-start gap-3">
                    <div class="w-3 h-3 mt-1.5 rounded-full flex-shrink-0" style="background: ${e.color}"></div>
                    <div class="flex-1 min-w-0">
                        <div class="font-medium text-sm">${e.title}</div>
                        <div class="text-xs text-gray-500 mt-1">${e.date} ${e.time ? '• ' + e.time : ''}</div>
                        ${e.desc ? `<div class="text-xs text-gray-600 mt-2">${e.desc}</div>` : ''}
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function prevMonth() {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar();
    }

    function nextMonth() {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar();
    }

    // Initialize
    window.onload = () => {
        const savedColor = localStorage.getItem('ctu_primary_color') || '#621708';
        document.documentElement.style.setProperty('--primary-color', savedColor);
        
        loadEvents();
        renderCalendar();
        renderUpcoming();
    };
</script>

</body>
</html>

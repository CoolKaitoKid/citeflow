<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar - CITE-Flow</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { font-family: 'Inter', sans-serif; }
        
        .sidebar { 
            background-color: #621708; 
            width: 280px;
        }
        
        .nav-item { 
            transition: all 0.2s ease; 
        }
        .nav-item:hover { 
            background-color: #8c2a10; 
        }
        .nav-item.active { 
            background-color: #8c2a10; 
            border-left: 4px solid #f5e8c7; 
        }

        .section-header {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0.75;
            padding-left: 20px;
            margin-bottom: 8px;
        }

        .sidebar-scroll::-webkit-scrollbar { 
            width: 4px; 
        }
        .sidebar-scroll::-webkit-scrollbar-thumb { 
            background-color: rgba(255,255,255,0.3); 
            border-radius: 20px; 
        }
        .sidebar-scroll::-webkit-scrollbar-thumb:hover { 
            background-color: rgba(255,255,255,0.5); 
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

.calendar-day {
    min-height: 90px;
    padding: 8px;
    transition: 0.2s;
}
.calendar-day:hover { background: #fefce8; }

.event-pill {
    font-size: 10px;
    padding: 3px 6px;
    border-radius: 6px;
    margin-top: 3px;
    color: white;
}
</style>
</head>

<body class="bg-gray-50">

<div class="flex h-screen">

<div class="sidebar text-white flex flex-col h-full">

        <!-- Top Logo Area -->
        <div onclick="window.location.href='/dashboard'" 
             class="px-6 pt-8 pb-6 cursor-pointer hover:bg-white/10 transition-colors flex flex-col items-center border-b border-white/10">
            <img src="ctu-logo.png" alt="CTU Logo" class="h-16 w-auto mb-3">
            <div class="text-center">
                <div class="font-semibold text-base leading-tight">College of Technology</div>
                <div class="font-semibold text-base leading-tight">and Engineering</div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex-1 sidebar-scroll overflow-y-auto py-8 px-4 space-y-8">

            <!-- FACULTIES & PROFILES -->
            <div>
                <div class="section-header text-white/70">FACULTIES & PROFILES</div>
                <div onclick="window.location.href='/faculty-profiles'" class="nav-item flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    <svg class="nav-icon" fill="none" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Faculty Profiles
                </div>
                <div onclick="window.location.href='/workload-tracker'" class="nav-item flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    <svg class="nav-icon" fill="none" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
                    Workload Tracker
                </div>
            </div>

            <!-- EVENTS -->
            <div>
                <div class="section-header text-white/70">EVENTS</div>
                <div onclick="window.location.href='/calendar'" 
                     class="nav-item active flex items-center gap-x-3 px-5 py-3 rounded-2xl text-sm font-medium cursor-pointer">
                    <svg class="nav-icon" fill="none" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    Calendar
                </div>
            </div>

        </div>

        <!-- Bottom Profile -->
        <div onclick="window.location.href = '/user/user-profile.html'" 
             class="mx-4 mb-6 bg-white/10 rounded-3xl p-4 flex items-center gap-x-3 hover:bg-white/20 transition-colors cursor-pointer">
            <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-[#621708] text-xl">👤</div>
            <div class="flex-1 min-w-0">
                <div class="font-semibold text-sm truncate">John Michael Santos</div>
                <div class="text-xs text-white/70">BSIT Student</div>
            </div>
        </div>

    </div>
<!-- MAIN -->
<div class="flex-1 p-8 overflow-y-auto">

<h1 class="text-2xl font-semibold mb-6">Academic Calendar</h1>

<!-- NAV -->
<div class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-3">
        <button onclick="prevMonth()" class="px-4 py-2 bg-white rounded-xl">←</button>
        <span id="currentMonth" class="text-xl font-semibold"></span>
        <span id="currentYear" class="text-xl"></span>
        <button onclick="nextMonth()" class="px-4 py-2 bg-white rounded-xl">→</button>
    </div>
</div>

<!-- GRID -->
<div class="grid grid-cols-12 gap-6">

<!-- CALENDAR -->
<div class="col-span-8 bg-white rounded-2xl p-4">
    <div class="grid grid-cols-7 text-xs text-gray-500 text-center mb-2">
        <div>Sun</div><div>Mon</div><div>Tue</div>
        <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>

    <div id="calendarGrid" class="grid grid-cols-7 gap-1"></div>
</div>

<!-- UPCOMING -->
<div class="col-span-4">
    <h2 class="font-semibold mb-3">Upcoming Events</h2>
    <div id="upcomingEvents" class="space-y-3"></div>
</div>

</div>
</div>
</div>

<!-- MODAL -->
<div id="viewModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
    <div class="bg-white rounded-2xl w-full max-w-md p-6">
        <div class="flex justify-between mb-4">
            <h3 class="font-semibold">Event Details</h3>
            <button onclick="closeModal()">×</button>
        </div>
        <div id="viewContent" class="space-y-3"></div>
    </div>
</div>

<script>
let currentDate = new Date();
let events = [];

function loadEvents(){
    const saved = localStorage.getItem('citeCalendarEvents');
    if(saved) events = JSON.parse(saved);
    else {
        events = [
            {title:"Meeting",date:"2026-03-10",time:"09:00",color:"#3b82f6",desc:"Faculty"},
            {title:"Exam",date:"2026-03-15",time:"08:00",color:"#ef4444"},
            {title:"Holiday",date:"2026-03-20",time:"",color:"#10b981"}
        ];
    }
}

function renderCalendar(){
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = "";

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    document.getElementById('currentMonth').textContent = months[month];
    document.getElementById('currentYear').textContent = year;

    const firstDay = new Date(year,month,1).getDay();
    const days = new Date(year,month+1,0).getDate();

    for(let i=0;i<firstDay;i++){
        grid.appendChild(document.createElement('div'));
    }

    for(let d=1; d<=days; d++){
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dayEvents = events.filter(e=>e.date===dateStr);

        const div = document.createElement('div');
        div.className = "calendar-day bg-gray-50 rounded-lg cursor-pointer";

        div.innerHTML = `
            <div class="text-xs font-semibold">${d}</div>
            ${dayEvents.map(e=>`
                <div class="event-pill" style="background:${e.color}">
                    ${e.title}
                </div>
            `).join('')}
        `;

        div.onclick = ()=>showDetails(dayEvents);
        grid.appendChild(div);
    }
}

function showDetails(dayEvents){
    if(dayEvents.length===0) return;

    const container = document.getElementById('viewContent');
    container.innerHTML="";

    dayEvents.forEach(e=>{
        const div = document.createElement('div');
        div.className="border-l-4 pl-3";
        div.style.borderColor = e.color;

        div.innerHTML = `
            <div class="font-semibold">${e.title}</div>
            <div class="text-xs text-gray-500">${e.date}</div>
            ${e.time ? `<div class="text-xs">🕒 ${e.time}</div>` : ''}
            ${e.desc ? `<div class="text-xs">${e.desc}</div>` : ''}
        `;

        container.appendChild(div);
    });

    document.getElementById('viewModal').classList.remove('hidden');
}

function closeModal(){
    document.getElementById('viewModal').classList.add('hidden');
}

function renderUpcoming(){
    const container = document.getElementById('upcomingEvents');
    container.innerHTML="";

    const today = new Date().toISOString().split('T')[0];

    const upcoming = events.filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date));

    upcoming.forEach(e=>{
        const div = document.createElement('div');
        div.className="flex gap-3 bg-white p-3 rounded-xl border";

        div.innerHTML = `
            <div class="w-2 rounded" style="background:${e.color}"></div>
            <div>
                <div class="text-sm font-medium">${e.title}</div>
                <div class="text-xs text-gray-500">${e.date}</div>
                ${e.time ? `<div class="text-xs">🕒 ${e.time}</div>` : ''}
            </div>
        `;

        container.appendChild(div);
    });
}

function prevMonth(){ currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }
function nextMonth(){ currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }

window.onload = ()=>{
    loadEvents();
    renderCalendar();
    renderUpcoming();
}
</script>

</body>
</html>
